// ============ GEMINI ============
const geminiCall=async(prompt,system)=>{
  try{
    const body={
      contents:[{parts:[{text:prompt}]}],
      generationConfig:{
        temperature:0.85,
        maxOutputTokens:8192,
        thinkingConfig:{thinkingBudget:-1}
      }
    };
    if(system)body.systemInstruction={parts:[{text:system}]};
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}`,
      {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    if(!res.ok){
      const errTxt=await res.text();
      console.error("Gemini HTTP",res.status,errTxt);
      return `⚠️ Error ${res.status}: ${errTxt.slice(0,200)}`;
    }
    const data=await res.json();
    // Si bloquea por seguridad, lo informamos
    if(data.promptFeedback?.blockReason){
      return `⚠️ El pedido fue bloqueado: ${data.promptFeedback.blockReason}`;
    }
    const cand=data.candidates?.[0];
    if(!cand)return "⚠️ La IA no devolvió respuesta. Probá reformulando la pregunta.";
    // Combinar TODOS los parts que tengan texto (Gemini 2.5 puede devolver varios bloques)
    const parts=cand.content?.parts||[];
    const text=parts.map(p=>p.text||"").filter(Boolean).join("\n").trim();
    if(!text){
      const fr=cand.finishReason||"unknown";
      console.warn("Gemini empty response. finishReason:",fr,"data:",data);
      if(fr==="MAX_TOKENS")return "⚠️ La respuesta se cortó por largo. Probá una pregunta más específica.";
      if(fr==="SAFETY")return "⚠️ La respuesta fue bloqueada por filtros de seguridad.";
      if(fr==="RECITATION")return "⚠️ La IA no pudo responder (posible recitación). Reformulá la pregunta.";
      return `⚠️ Respuesta vacía (motivo: ${fr}). Probá de nuevo o reformulá.`;
    }
    return text;
  }catch(e){
    console.error(e);
    return "⚠️ Error de conexión: "+e.message;
  }
};

const geminiJSON=async(prompt)=>{
  const raw=await geminiCall(prompt);
  const clean=raw.replace(/```json|```/g,"").trim();
  try{return JSON.parse(clean);}catch{return null;}
};

// Mini renderer de Markdown (negritas, cursivas, listas, títulos, código)
// No usa dangerouslySetInnerHTML — todo es JSX seguro
const escapeHTML=s=>s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const renderInline=(text,key="i")=>{
  // Procesa **negrita**, *cursiva*, `código`, [link](url)
  const parts=[];
  let i=0,k=0;
  const re=/(\*\*[^*\n]+\*\*|\*[^*\n]+\*|`[^`\n]+`|\[[^\]]+\]\([^)]+\))/g;
  let m,lastEnd=0;
  while((m=re.exec(text))!==null){
    if(m.index>lastEnd)parts.push(text.slice(lastEnd,m.index));
    const tok=m[0];
    if(tok.startsWith("**"))parts.push(<strong key={key+"-"+(k++)} style={{color:"#fff"}}>{tok.slice(2,-2)}</strong>);
    else if(tok.startsWith("`"))parts.push(<code key={key+"-"+(k++)} style={{background:"rgba(255,255,255,0.1)",padding:"1px 5px",borderRadius:4,fontFamily:"'Courier New',monospace",fontSize:"0.9em"}}>{tok.slice(1,-1)}</code>);
    else if(tok.startsWith("*"))parts.push(<em key={key+"-"+(k++)}>{tok.slice(1,-1)}</em>);
    else if(tok.startsWith("[")){
      const lm=tok.match(/\[([^\]]+)\]\(([^)]+)\)/);
      if(lm)parts.push(<a key={key+"-"+(k++)} href={lm[2]} target="_blank" rel="noreferrer" style={{color:"var(--green-l)",textDecoration:"underline"}}>{lm[1]}</a>);
    }
    lastEnd=m.index+tok.length;
  }
  if(lastEnd<text.length)parts.push(text.slice(lastEnd));
  return parts;
};
const Markdown=({text})=>{
  if(!text)return null;
  const lines=text.split("\n");
  const out=[];
  let i=0;
  while(i<lines.length){
    const line=lines[i];
    // Heading
    const h=line.match(/^(#{1,4})\s+(.+)$/);
    if(h){
      const lvl=h[1].length;
      const sizes={1:18,2:16,3:15,4:14};
      out.push(<div key={i} style={{fontWeight:700,fontSize:sizes[lvl],marginTop:i>0?10:0,marginBottom:6,color:"var(--green-l)"}}>{renderInline(h[2],"h"+i)}</div>);
      i++;continue;
    }
    // Lista (- o •)
    if(/^[\s]*[-•*]\s+/.test(line)){
      const items=[];
      while(i<lines.length&&/^[\s]*[-•*]\s+/.test(lines[i])){
        items.push(lines[i].replace(/^[\s]*[-•*]\s+/,""));
        i++;
      }
      out.push(<ul key={"u"+i} style={{margin:"6px 0",paddingLeft:18}}>{items.map((it,k)=><li key={k} style={{marginBottom:3,color:"var(--text)"}}>{renderInline(it,"li"+i+"-"+k)}</li>)}</ul>);
      continue;
    }
    // Lista numerada
    if(/^[\s]*\d+\.\s+/.test(line)){
      const items=[];
      while(i<lines.length&&/^[\s]*\d+\.\s+/.test(lines[i])){
        items.push(lines[i].replace(/^[\s]*\d+\.\s+/,""));
        i++;
      }
      out.push(<ol key={"o"+i} style={{margin:"6px 0",paddingLeft:22}}>{items.map((it,k)=><li key={k} style={{marginBottom:3}}>{renderInline(it,"oli"+i+"-"+k)}</li>)}</ol>);
      continue;
    }
    // Línea vacía
    if(line.trim()===""){out.push(<div key={i} style={{height:8}}/>);i++;continue;}
    // Párrafo simple
    out.push(<div key={i} style={{marginBottom:4}}>{renderInline(line,"p"+i)}</div>);
    i++;
  }
  return <>{out}</>;
};

  useEffect(()=>{if(chatTecRef.current)chatTecRef.current.scrollTop=chatTecRef.current.scrollHeight;},[chatTecHist,chatTecBusy]);

  const sendChat=async(tipo)=>{
    const input=tipo==="tec"?chatTecInput:chatGenInput;
    if(!input.trim())return;
    const setInput=tipo==="tec"?setChatTecInput:setChatGenInput;
    const setHist=tipo==="tec"?setChatTecHist:setChatGenHist;
    const hist=tipo==="tec"?chatTecHist:chatGenHist;
    const setBusy=tipo==="tec"?setChatTecBusy:setChatGenBusy;
    const sys=tipo==="tec"?SYS_TECNICO:SYS_GENERAL;
    setInput("");setBusy(true);
    const userMsg={role:"user",content:input,t:Date.now()};
    setHist(h=>[...h,userMsg]);
    // Construimos contexto con últimos 6 mensajes
    const ctx=[...hist.slice(-6),userMsg].map(m=>`${m.role==="user"?"Usuario":"Asistente"}: ${m.content}`).join("\n\n");
    const resp=await geminiCall(ctx+"\n\nAsistente:",sys);
    setHist(h=>[...h,{role:"assistant",content:resp,t:Date.now()}]);
    setBusy(false);
  };
  const clearChat=tipo=>{
    if(!confirm("¿Borrar toda la conversación?"))return;
    if(tipo==="tec")setChatTecHist([]);else setChatGenHist([]);

  const ChatView=({tipo})=>{
    const hist=tipo==="tec"?chatTecHist:chatGenHist;
    const input=tipo==="tec"?chatTecInput:chatGenInput;
    const setInput=tipo==="tec"?setChatTecInput:setChatGenInput;
    const busy=tipo==="tec"?chatTecBusy:chatGenBusy;
    const ref=tipo==="tec"?chatTecRef:chatGenRef;
    const title=tipo==="tec"?"🌳 Chat Técnico":"💬 Chat General";
    const subtitle=tipo==="tec"?"Sintropia · Agrofloresta · Agroecología":"Asistente para todo lo demás";
    const suggestions=tipo==="tec"
      ?["¿Cómo inicio un SAF?","Orden de siembra en sintropia","Preparar biofertilizante","Manejo del sombreado"]

    return (
      <div className="fade" style={{display:"flex",flexDirection:"column",height:"calc(100vh - 180px)"}}>

        </Card>

        <div ref={ref} style={{flex:1,overflowY:"auto",background:"rgba(0,0,0,0.2)",borderRadius:12,padding:12,marginBottom:10,border:"1px solid var(--border)"}}>
          {hist.length===0&&(
            <div style={{textAlign:"center",color:"var(--muted)",padding:"20px 10px"}}>
              <div style={{fontSize:32,marginBottom:10}}>{tipo==="tec"?"🌳":"💬"}</div>
              <div style={{fontSize:13,marginBottom:14}}>Preguntame lo que necesites</div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {suggestions.map(s=><button key={s} onClick={()=>setInput(s)} style={{background:"rgba(76,175,80,0.1)",border:"1px solid rgba(76,175,80,0.3)",color:"var(--green-l)",borderRadius:8,padding:"8px 12px",fontSize:12,cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>→ {s}</button>)}
              </div>
            </div>

            <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:10}}>
              <div style={{maxWidth:"88%",padding:"11px 15px",borderRadius:14,background:m.role==="user"?"linear-gradient(135deg,var(--green),var(--green-d))":"rgba(255,255,255,0.06)",border:m.role==="assistant"?"1px solid var(--border)":"none",fontSize:13,lineHeight:1.6,whiteSpace:m.role==="user"?"pre-wrap":"normal",wordBreak:"break-word"}}>
                {m.role==="user"?m.content:<Markdown text={m.content}/>}

            </div>
          ))}

        </div>
      </div>
    );
  };

  // ========= PRODUCTOS =========
  const [prodMode,setProdMode]=useState("lista");
  const [prodForm,setProdForm]=useState({nombre:"",precio:"",unidad:"",categoria:"Verduras",stock:""});
  const [prodEdit,setProdEdit]=useState(null);

  const saveProducto=()=>{
    if(!prodForm.nombre||!prodForm.precio)return;
    if(prodEdit){
      setProductos(ps=>ps.map(p=>p.id===prodEdit?{...p,...prodForm,precio:+prodForm.precio,stock:+prodForm.stock||0}:p));
    }else{
      setProductos(ps=>[...ps,{id:Date.now(),...prodForm,precio:+prodForm.precio,stock:+prodForm.stock||0}]);

  const diasDelMes=(()=>{
    const y=calMes.getFullYear(),m=calMes.getMonth();
    const primero=new Date(y,m,1);
    const diaSemInicio=(primero.getDay()+6)%7; // lunes=0
    const ultimo=new Date(y,m+1,0).getDate();
    const arr=[];
    for(let i=0;i<diaSemInicio;i++)arr.push(null);
    for(let i=1;i<=ultimo;i++){
      const iso=`${y}-${String(m+1).padStart(2,"0")}-${String(i).padStart(2,"0")}`;
      const evs=eventos.filter(e=>e.fecha===iso);
      arr.push({dia:i,iso,evs,isToday:iso===todayISO()});
    }
    return arr;
  })();
  const evsHoy=eventos.filter(e=>e.fecha===todayISO()).sort((a,b)=>a.hora.localeCompare(b.hora));
  const evsProximos=eventos.filter(e=>e.fecha>todayISO()).sort((a,b)=>(a.fecha+a.hora).localeCompare(b.fecha+b.hora)).slice(0,5);

  const [recForm,setRecForm]=useState({nombre:"",ingredientes:"",preparacion:"",temporada:""});

  const generarReceta=async()=>{
    if(!recGenIngr.trim())return;

    if(data)setRecForm({nombre:data.nombre||"",ingredientes:data.ingredientes||"",preparacion:data.preparacion||"",temporada:data.temporada||""});

  const [ideasBusy,setIdeasBusy]=useState(false);

  const generarIdeas=async()=>{
    setIdeasBusy(true);
    const prompt=`Sos creador/a de contenido de la Huerta Agroecológica Siglo XXI (Pigüé, Buenos Aires, Argentina). Escribís en español rioplatense con voseo, voz cálida y auténtica de emprendimiento familiar.

Generá 5 ideas de contenido para redes sociales. ${ideasTema.trim()?`Foco temático del usuario: "${ideasTema}". `:""}Variá entre estos tipos para que las 5 ideas no sean parecidas:
- Educativo profundo (sintropia, agrofloresta, manejo de suelo, plantas asociadas, biofertilizantes)
- Producto / cosecha (qué tenés disponible, cómo se cultivó)
- Taller o evento (invitación, propuesta de valor)
- Detrás de escena / historia / comunidad (proceso, manos trabajando, momento del año)
- Tip práctico para el lector (algo accionable que puedan probar en casa)

Para cada idea dame:
- titulo: frase llamativa de 4 a 8 palabras
- formato: uno de "post", "carrusel", "reel", "story", "video"
- copy: el texto que se publica DEBAJO de la imagen, entre 50 y 120 palabras. Tiene que ser auténtico, contar algo, invitar a interactuar. NO uses frases hechas tipo "directo del campo a tu mesa". Buscá originalidad.
- hashtags: 5 a 8 hashtags relevantes (incluir #HuertaSXXI #Agroecologia #Pigue y otros que correspondan al tema)
- llamadoAccion: 1 frase corta al final que invite a comentar/compartir/visitar

Respondé SÓLO JSON sin markdown ni explicaciones: {"ideas":[{"titulo":"","formato":"","copy":"","hashtags":"","llamadoAccion":""}]}`;
    const data=await geminiJSON(prompt);
    if(data?.ideas){
      const nuevas=data.ideas.map(i=>({id:Date.now()+Math.random(),...i,fecha:todayISO(),usada:false}));
      setIdeas(is=>[...nuevas,...is]);

      alert("No se pudo generar ideas. Probá con un tema más concreto o reintentá.");

    setIdeasBusy(false);
  };

    setIdeas(is=>is.filter(i=>i.id!==idea.id));
  };
  const deleteIdea=id=>setIdeas(is=>is.filter(i=>i.id!==id));

  // ========= HISTORIAL =========
  const [histForm,setHistForm]=useState({titulo:"",formato:"post",copy:"",nota:""});
  const [histMode,setHistMode]=useState("lista");
  const addHistorial=()=>{
    if(!histForm.titulo)return;
    setHistorial(h=>[{id:Date.now(),...histForm,fecha:todayISO()},...h]);
    setHistForm({titulo:"",formato:"post",copy:"",nota:""});
    setHistMode("lista");
  };
  const deleteHist=id=>setHistorial(h=>h.filter(x=>x.id!==id));

  // ========= ESTADISTICAS =========
  const stats=useMemo(()=>{
    const hoy=new Date();
    const mesActual=hoy.toISOString().slice(0,7);
    const pedMes=pedidos.filter(p=>p.fecha?.startsWith(mesActual));
    const pedSem=pedidos.filter(p=>{const d=new Date(p.fecha+"T12:00:00");return (hoy-d)/86400000<7;});
    const totalMes=pedMes.reduce((s,p)=>s+(p.total||0),0);
    const entregados=pedMes.filter(p=>p.estado==="entregado").length;
    const pendientes=pedidos.filter(p=>p.estado!=="entregado"&&p.estado!=="cancelado").length;
    const cosMes=cosechas.filter(c=>c.fecha?.startsWith(mesActual));
    const totalCos=cosMes.reduce((s,c)=>s+(+c.cantidad||0),0);
    // Top productos
    const contProd={};
    pedMes.forEach(p=>p.items?.forEach(i=>{contProd[i.nombre]=(contProd[i.nombre]||0)+(i.cantidad||0);}));
    const top=Object.entries(contProd).sort((a,b)=>b[1]-a[1]).slice(0,3);

    const topCli=Object.entries(contCli).sort((a,b)=>b[1]-a[1]).slice(0,3);
    return {pedMes:pedMes.length,pedSem:pedSem.length,totalMes,entregados,pendientes,totalCos,cosMes:cosMes.length,top,topCli,eventosMes:eventos.filter(e=>e.fecha?.startsWith(mesActual)).length,ideasMes:ideas.filter(i=>i.fecha?.startsWith(mesActual)).length,histMes:historial.filter(h=>h.fecha?.startsWith(mesActual)).length};
  },[pedidos,cosechas,eventos,ideas,historial]);

  // ========= EXPORTAR / IMPORTAR DATOS =========
  const exportarDatos=()=>{
    const data={pedidos,productos,clientes,eventos,cosechas,recetas,ideas,historial,chatTec:chatTecHist,chatGen:chatGenHist,exportadoEl:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`huerta-backup-${todayISO()}.json`;a.click();
  };
  const importarRef=useRef();
  const importarDatos=e=>{
    const f=e.target.files?.[0];if(!f)return;

      try{
        const d=JSON.parse(ev.target.result);
        if(!confirm("Esto reemplazará todos tus datos actuales. ¿Continuar?"))return;
        if(d.pedidos)setPedidos(d.pedidos);
        if(d.productos)setProductos(d.productos);
        if(d.clientes)setClientes(d.clientes);
        if(d.eventos)setEventos(d.eventos);
        if(d.cosechas)setCosechas(d.cosechas);
        if(d.recetas)setRecetas(d.recetas);
        if(d.ideas)setIdeas(d.ideas);
        if(d.historial)setHistorial(d.historial);
        if(d.chatTec)setChatTecHist(d.chatTec);
        if(d.chatGen)setChatGenHist(d.chatGen);
        alert("✅ Datos importados correctamente");

  // ============ RENDER ============

            <h1 className="brand" style={{fontSize:30,lineHeight:1.1,marginBottom:10}}>Gestión integral<br/><em style={{color:"var(--green-l)",fontStyle:"italic"}}>de la huerta</em></h1>
            <p style={{color:"var(--muted)",fontSize:13,maxWidth:380,margin:"0 auto"}}>Pedidos · Clientes · Producción · Contenido · Chat con IA</p>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:10}}>
              <div><div style={{fontSize:20,fontWeight:700}}>{stats.pendientes}</div><div style={{fontSize:10,color:"var(--muted)"}}>Pedidos pendientes</div></div>
              <div><div style={{fontSize:20,fontWeight:700}}>{evsHoy.length}</div><div style={{fontSize:10,color:"var(--muted)"}}>Eventos hoy</div></div>
              <div><div style={{fontSize:20,fontWeight:700}}>{fmtMoney(stats.totalMes)}</div><div style={{fontSize:10,color:"var(--muted)"}}>Ventas del mes</div></div>

              </div>

          </Card>

            {MODULES.map(m=>{

                          {p.telefono&&<div style={{fontSize:11,color:"var(--muted)"}}>📞 <a href={`tel:${p.telefono}`} style={{color:"var(--muted)"}}>{p.telefono}</a> · <a href={`https://wa.me/${p.telefono.replace(/\D/g,"")}`} target="_blank" rel="noreferrer" style={{color:"var(--green-l)"}}>WhatsApp</a></div>}

                      </div>
                      <div style={{background:"rgba(0,0,0,0.2)",borderRadius:8,padding:8,marginBottom:8,fontSize:12,lineHeight:1.6}}>

                      </div>
                      <div style={{display:"flex",gap:10,fontSize:11,color:"var(--muted)",marginBottom:8,flexWrap:"wrap"}}>
                        <span>📅 {fmtDate(p.entrega)}</span>
                        <span>💳 {p.pago}</span>
                      </div>
                      {p.nota&&<div style={{fontSize:11,color:"var(--muted)",fontStyle:"italic",marginBottom:8,padding:"4px 8px",background:"rgba(255,255,255,0.03)",borderRadius:6}}>“{p.nota}”</div>}
                      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                        <select value={p.estado} onChange={e=>cambiarEstado(p.id,e.target.value)} style={{background:"rgba(255,255,255,0.05)",border:"1px solid var(--border)",borderRadius:6,padding:"4px 8px",color:"#fff",fontSize:11,fontFamily:"inherit",cursor:"pointer"}}>
                          <option value="nuevo">nuevo</option>
                          <option value="preparando">preparando</option>
                          <option value="listo">listo</option>
                          <option value="entregado">entregado</option>
                          <option value="cancelado">cancelado</option>
                        </select>
                        <button onClick={()=>copiarWspPedido(p)} style={{background:"rgba(0,201,167,0.15)",border:"1px solid rgba(0,201,167,0.4)",color:"var(--mint)",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>📋 Copiar mensaje</button>

                      </div>
                    </Card>
                  ))}
                </>

              {prodMode==="form"?(
                <Card>
                  <Lbl>{prodEdit?"Editar producto":"Nuevo producto"}</Lbl>

                  <Lbl>Categoría</Lbl>

                    {categorias.map(c=><Pill key={c} active={prodForm.categoria===c} onClick={()=>setProdForm(f=>({...f,categoria:c}))}>{c}</Pill>)}

                            <div style={{flex:1}}>
                              <div style={{fontWeight:600,fontSize:13}}>{p.nombre}</div>

                            </div>
                            <button onClick={()=>editProducto(p)} style={{background:"rgba(255,255,255,0.06)",border:"1px solid var(--border)",color:"#fff",borderRadius:6,padding:"6px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>✏️</button>

                          </Card>
                        ))}
                      </div>

                <Pill active={cliMode==="form"} onClick={()=>{setCliMode("form");setCliEdit(null);setCliForm({nombre:"",telefono:"",nota:""});}}>➕ Nuevo</Pill>

              {cliMode==="form"?(
                <Card>
                  <Lbl>{cliEdit?"Editar":"Nuevo"} cliente</Lbl>
                  <Input value={cliForm.nombre} onChange={e=>setCliForm(f=>({...f,nombre:e.target.value}))} placeholder="Nombre" style={{marginBottom:8}}/>

                    {c.nota&&<div style={{fontSize:11,color:"var(--muted)",fontStyle:"italic",marginTop:4}}>{c.nota}</div>}

            <div className="fade">

                <Pill active={evMode==="lista"} onClick={()=>setEvMode("lista")}>📅 Vista</Pill>

                </Card>

                <>
                  {/* Calendario mensual simple */}
                  <Card style={{marginBottom:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                      <button onClick={()=>setCalMes(d=>new Date(d.getFullYear(),d.getMonth()-1,1))} style={{background:"rgba(255,255,255,0.06)",border:"1px solid var(--border)",color:"#fff",borderRadius:8,padding:"6px 12px",cursor:"pointer"}}>◀</button>
                      <div style={{fontWeight:700,textTransform:"capitalize"}}>{mesNombre}</div>
                      <button onClick={()=>setCalMes(d=>new Date(d.getFullYear(),d.getMonth()+1,1))} style={{background:"rgba(255,255,255,0.06)",border:"1px solid var(--border)",color:"#fff",borderRadius:8,padding:"6px 12px",cursor:"pointer"}}>▶</button>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,fontSize:9,color:"var(--muted)",textAlign:"center",marginBottom:6,fontFamily:"'Courier New',monospace"}}>

                        </div>

                      <button onClick={()=>deleteEvento(e.id)} style={{background:"transparent",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:13}}>🗑</button>
                    </Card>

                </div>

                <Btn onClick={addCosecha} disabled={!cosForm.producto||!cosForm.cantidad}>🥬 Registrar</Btn>
              </Card>

              <Lbl style={{marginLeft:4}}>Últimas cosechas ({cosechas.length})</Lbl>
              {cosechas.length===0?(
                <Card style={{textAlign:"center",padding:30}}>
                  <div style={{fontSize:40,marginBottom:10,opacity:0.5}}>🥬</div>
                  <div style={{fontSize:13,color:"var(--muted)"}}>Empezá a registrar lo que cosechás</div>
                </Card>
              ):cosechas.slice(0,30).map(c=>(
                <Card key={c.id} style={{marginBottom:6,padding:10,display:"flex",alignItems:"center",gap:10}}>
                  <div style={{fontSize:20}}>🥬</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:13}}>{c.producto}</div>
                    <div style={{fontSize:11,color:"var(--muted)"}}>{c.cantidad} {c.unidad} · {fmtDate(c.fecha)}</div>
                    {c.nota&&<div style={{fontSize:10,color:"var(--muted)",fontStyle:"italic",marginTop:2}}>{c.nota}</div>}
                  </div>
                  <button onClick={()=>deleteCosecha(c.id)} style={{background:"transparent",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:13}}>🗑</button>
                </Card>
              ))}
            </div>
          )}

          {/* ========= RECETAS ========= */}
          {view==="recetas"&&(
            <div className="fade">
              <Card style={{marginBottom:14}}>
                <Lbl>✨ Generar receta con IA</Lbl>
                <Input value={recGenIngr} onChange={e=>setRecGenIngr(e.target.value)} placeholder="Ingredientes disponibles (ej: zapallitos, albahaca, cebolla)" style={{marginBottom:8}}/>
                <Btn onClick={generarReceta} disabled={recGenBusy||!recGenIngr.trim()}>{recGenBusy?<><Spinner/> &nbsp;Creando receta...</>:"✨ Generar receta"}</Btn>
              </Card>

              <Card style={{marginBottom:14}}>
                <Lbl>{recForm.nombre?"Editar":"Nueva"} receta</Lbl>
                <Input value={recForm.nombre} onChange={e=>setRecForm(f=>({...f,nombre:e.target.value}))} placeholder="Nombre" style={{marginBottom:8}}/>
                <TA value={recForm.ingredientes} onChange={e=>setRecForm(f=>({...f,ingredientes:e.target.value}))} placeholder="Ingredientes" style={{marginBottom:8,minHeight:80}}/>
                <TA value={recForm.preparacion} onChange={e=>setRecForm(f=>({...f,preparacion:e.target.value}))} placeholder="Preparación" style={{marginBottom:8,minHeight:100}}/>
                <Input value={recForm.temporada} onChange={e=>setRecForm(f=>({...f,temporada:e.target.value}))} placeholder="Temporada (ej: verano)" style={{marginBottom:10}}/>
                <Btn onClick={saveReceta} disabled={!recForm.nombre||!recForm.ingredientes}>💾 Guardar receta</Btn>
              </Card>

              <Lbl style={{marginLeft:4}}>Recetario ({recetas.length})</Lbl>
              {recetas.map(r=>(
                <Card key={r.id} style={{marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"start",marginBottom:6}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:14}}>🥗 {r.nombre}</div>
                      {r.temporada&&<div style={{fontSize:10,color:"var(--green-l)",fontFamily:"'Courier New',monospace",textTransform:"uppercase",letterSpacing:1}}>{r.temporada}</div>}
                    </div>
                    <button onClick={()=>deleteReceta(r.id)} style={{background:"transparent",border:"none",color:"var(--muted)",cursor:"pointer"}}>🗑</button>
                  </div>
                  <details>
                    <summary style={{fontSize:12,color:"var(--green-l)",cursor:"pointer",padding:"4px 0"}}>Ver receta</summary>
                    <div style={{fontSize:12,color:"var(--muted)",marginTop:8,lineHeight:1.6,whiteSpace:"pre-wrap"}}>
                      <strong style={{color:"#fff"}}>Ingredientes:</strong>{"\n"}{r.ingredientes}{"\n\n"}
                      <strong style={{color:"#fff"}}>Preparación:</strong>{"\n"}{r.preparacion}
                    </div>
                    <button onClick={()=>{navigator.clipboard?.writeText(`🥗 ${r.nombre}\n\nIngredientes:\n${r.ingredientes}\n\nPreparación:\n${r.preparacion}\n\n🌱 ${BRAND_NAME}`);alert("✅ Receta copiada");}} style={{marginTop:8,background:"rgba(0,201,167,0.15)",border:"1px solid var(--mint)",color:"var(--mint)",borderRadius:6,padding:"5px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>📋 Copiar para redes</button>
                  </details>
                </Card>
              ))}
            </div>
          )}

          {/* ========= IDEAS ========= */}
          {view==="ideas"&&(
            <div className="fade">
              <Card style={{marginBottom:14}}>
                <Lbl>✨ Generar 5 ideas de contenido</Lbl>
                <Input value={ideasTema} onChange={e=>setIdeasTema(e.target.value)} placeholder="Tema opcional (ej: primavera, talleres, compost)" style={{marginBottom:8}}/>
                <Btn onClick={generarIdeas} disabled={ideasBusy}>{ideasBusy?<><Spinner/> &nbsp;Pensando ideas...</>:"✨ Generar ideas"}</Btn>
              </Card>

              <Lbl style={{marginLeft:4}}>Banco de ideas ({ideas.filter(i=>!i.usada).length} sin usar)</Lbl>
              {ideas.length===0&&(
                <Card style={{textAlign:"center",padding:30}}>
                  <div style={{fontSize:40,marginBottom:10,opacity:0.5}}>💡</div>
                  <div style={{fontSize:13,color:"var(--muted)"}}>Generá tu primer banco de ideas</div>
                </Card>
              )}
              {ideas.map(i=>(
                <Card key={i.id} style={{marginBottom:10,opacity:i.usada?0.5:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"start",marginBottom:6}}>
                    <div style={{fontWeight:700,fontSize:14,flex:1}}>💡 {i.titulo}</div>
                    <span style={{fontSize:9,background:"rgba(76,175,80,0.2)",color:"var(--green-l)",padding:"2px 6px",borderRadius:10,fontFamily:"'Courier New',monospace",textTransform:"uppercase",whiteSpace:"nowrap",marginLeft:6}}>{i.formato}</span>
                  </div>
                  <div style={{fontSize:13,color:"#eaf2ec",marginBottom:8,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{i.copy}</div>
                  {i.llamadoAccion&&<div style={{fontSize:12,color:"var(--mint)",marginBottom:8,fontStyle:"italic",fontWeight:600}}>→ {i.llamadoAccion}</div>}
                  {i.hashtags&&<div style={{fontSize:11,color:"var(--green-l)",marginBottom:10,fontFamily:"'Courier New',monospace",lineHeight:1.5}}>{i.hashtags}</div>}
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    <button onClick={()=>{
                      const full=`${i.titulo}\n\n${i.copy}${i.llamadoAccion?`\n\n${i.llamadoAccion}`:""}${i.hashtags?`\n\n${i.hashtags}`:""}`;
                      navigator.clipboard?.writeText(full);
                      alert("✅ Idea completa copiada");
                    }} style={{background:"rgba(0,201,167,0.15)",border:"1px solid var(--mint)",color:"var(--mint)",borderRadius:6,padding:"5px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>📋 Copiar todo</button>
                    <button onClick={()=>{navigator.clipboard?.writeText(i.copy);alert("✅ Sólo el copy");}} style={{background:"transparent",border:"1px solid var(--border)",color:"var(--muted)",borderRadius:6,padding:"5px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>Sólo copy</button>
                    <button onClick={()=>moverAHistorial(i)} style={{background:"rgba(76,175,80,0.15)",border:"1px solid var(--green)",color:"var(--green-l)",borderRadius:6,padding:"5px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>✓ Ya la usé</button>
                    <button onClick={()=>marcarUsada(i.id,!i.usada)} style={{background:"transparent",border:"1px solid var(--border)",color:"var(--muted)",borderRadius:6,padding:"5px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>{i.usada?"Reactivar":"Pausar"}</button>
                    <button onClick={()=>deleteIdea(i.id)} style={{background:"transparent",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:13,marginLeft:"auto"}}>🗑</button>
                  </div>
                </Card>
              ))}
            </div>
          )}

          {/* ========= HISTORIAL ========= */}
          {view==="historial"&&(
            <div className="fade">
              <div style={{display:"flex",gap:6,marginBottom:12}}>
                <Pill active={histMode==="lista"} onClick={()=>setHistMode("lista")}>📚 Lista ({historial.length})</Pill>
                <Pill active={histMode==="form"} onClick={()=>setHistMode("form")}>➕ Cargar</Pill>
              </div>
              {histMode==="form"?(
                <Card>
                  <Lbl>Cargar publicación ya hecha</Lbl>
                  <Input value={histForm.titulo} onChange={e=>setHistForm(f=>({...f,titulo:e.target.value}))} placeholder="Título/tema" style={{marginBottom:8}}/>
                  <Lbl>Formato</Lbl>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
                    {["post","carrusel","reel","story","video"].map(f=><Pill key={f} active={histForm.formato===f} onClick={()=>setHistForm(p=>({...p,formato:f}))}>{f}</Pill>)}
                  </div>
                  <TA value={histForm.copy} onChange={e=>setHistForm(f=>({...f,copy:e.target.value}))} placeholder="Copy publicado" style={{marginBottom:8,minHeight:80}}/>
                  <TA value={histForm.nota} onChange={e=>setHistForm(f=>({...f,nota:e.target.value}))} placeholder="Nota (resultados, interacción, etc.)" style={{marginBottom:10,minHeight:50}}/>
                  <Btn onClick={addHistorial} disabled={!histForm.titulo}>💾 Guardar</Btn>
                </Card>
              ):historial.length===0?(
                <Card style={{textAlign:"center",padding:30}}>
                  <div style={{fontSize:40,marginBottom:10,opacity:0.5}}>📚</div>
                  <div style={{fontSize:13,color:"var(--muted)"}}>Llevá registro de lo que ya publicaste</div>
                </Card>
              ):historial.map(h=>(
                <Card key={h.id} style={{marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"start",marginBottom:4}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:13}}>📚 {h.titulo}</div>
                      <div style={{fontSize:10,color:"var(--muted)",fontFamily:"'Courier New',monospace"}}>{h.formato?.toUpperCase()} · {fmtDate(h.fecha)}</div>
                    </div>
                    <button onClick={()=>deleteHist(h.id)} style={{background:"transparent",border:"none",color:"var(--muted)",cursor:"pointer"}}>🗑</button>
                  </div>
                  {h.copy&&<div style={{fontSize:11,color:"var(--muted)",marginTop:4,fontStyle:"italic"}}>{h.copy.length>120?h.copy.slice(0,120)+"…":h.copy}</div>}
                  {h.nota&&<div style={{fontSize:10,color:"var(--green-l)",marginTop:4,padding:"4px 8px",background:"rgba(76,175,80,0.08)",borderRadius:6}}>📊 {h.nota}</div>}
                </Card>
              ))}
            </div>
          )}

          {/* ========= STATS ========= */}
          {view==="stats"&&(
            <div className="fade">
              <Card style={{marginBottom:14,padding:16,background:"linear-gradient(135deg,rgba(76,175,80,0.15),rgba(0,201,167,0.08))"}}>
                <Lbl style={{color:"var(--green-l)"}}>Este mes</Lbl>
                <div style={{fontSize:28,fontWeight:800,marginBottom:4}}>{fmtMoney(stats.totalMes)}</div>
                <div style={{fontSize:11,color:"var(--muted)"}}>en {stats.pedMes} pedidos · {stats.entregados} entregados</div>
              </Card>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
                <Card style={{padding:12}}>
                  <div style={{fontSize:22,fontWeight:700}}>{stats.pedSem}</div>
                  <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",fontFamily:"'Courier New',monospace",letterSpacing:1}}>Pedidos semana</div>
                </Card>
                <Card style={{padding:12}}>
                  <div style={{fontSize:22,fontWeight:700}}>{stats.pendientes}</div>
                  <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",fontFamily:"'Courier New',monospace",letterSpacing:1}}>Pendientes</div>
                </Card>
                <Card style={{padding:12}}>
                  <div style={{fontSize:22,fontWeight:700}}>{stats.cosMes}</div>
                  <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",fontFamily:"'Courier New',monospace",letterSpacing:1}}>Cosechas mes</div>
                </Card>
                <Card style={{padding:12}}>
                  <div style={{fontSize:22,fontWeight:700}}>{clientes.length}</div>
                  <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",fontFamily:"'Courier New',monospace",letterSpacing:1}}>Clientes</div>
                </Card>
              </div>

              {stats.top.length>0&&(
                <Card style={{marginBottom:14}}>
                  <Lbl>🏆 Productos más pedidos del mes</Lbl>
                  {stats.top.map(([n,c],i)=>(
                    <div key={n} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,fontSize:13}}>
                      <div style={{width:24,height:24,background:"rgba(76,175,80,0.2)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"var(--green-l)"}}>{i+1}</div>
                      <div style={{flex:1}}>{n}</div>
                      <div style={{fontSize:11,color:"var(--muted)",fontFamily:"'Courier New',monospace"}}>{c} u</div>
                    </div>
                  ))}
                </Card>
              )}

              {stats.topCli.length>0&&(
                <Card style={{marginBottom:14}}>
                  <Lbl>👑 Clientes más activos del mes</Lbl>
                  {stats.topCli.map(([n,c],i)=>(
                    <div key={n} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,fontSize:13}}>
                      <div style={{width:24,height:24,background:"rgba(0,201,167,0.2)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"var(--mint)"}}>{i+1}</div>
                      <div style={{flex:1}}>{n}</div>
                      <div style={{fontSize:11,color:"var(--muted)",fontFamily:"'Courier New',monospace"}}>{c} ped</div>
                    </div>
                  ))}
                </Card>
              )}

              <Card style={{padding:14}}>
                <Lbl>📊 Contenido</Lbl>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,textAlign:"center"}}>
                  <div><div style={{fontSize:18,fontWeight:700}}>{stats.ideasMes}</div><div style={{fontSize:10,color:"var(--muted)"}}>Ideas</div></div>
                  <div><div style={{fontSize:18,fontWeight:700}}>{stats.histMes}</div><div style={{fontSize:10,color:"var(--muted)"}}>Publicado</div></div>
                  <div><div style={{fontSize:18,fontWeight:700}}>{stats.eventosMes}</div><div style={{fontSize:10,color:"var(--muted)"}}>Eventos</div></div>
                </div>
              </Card>
            </div>
          )}

        </main>
      )}

      <footer style={{textAlign:"center",padding:"14px",fontSize:10,color:"rgba(234,242,236,0.3)",fontFamily:"'Courier New',monospace",letterSpacing:2,borderTop:"1px solid var(--border)"}}>
        HUERTA SXXI · ASISTENTE · v1.0
      </footer>
    </div>
  );
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
<script>
  if("serviceWorker" in navigator){
    window.addEventListener("load",()=>{
      navigator.serviceWorker.register("sw-asistente.js").catch(()=>{});
    });
  }
</script>
</body>
</html>
