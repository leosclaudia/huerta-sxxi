  .mono{font-family:'Courier New',monospace;letter-spacing:0.08em;text-transform:uppercase;font-size:10px;}
  .divider{border:none;height:1px;background:linear-gradient(90deg,transparent,var(--border-strong),transparent);margin:18px 0;}
  @keyframes spin{to{transform:rotate(360deg);}}

  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

);

// ============ HELPERS CANVAS ============
const loadImage=src=>new Promise((res,rej)=>{const i=new Image();i.crossOrigin="anonymous";i.onload=()=>res(i);i.onerror=rej;i.src=src;});

const drawImageCover=(ctx,img,x,y,w,h)=>{
  const scale=Math.max(w/img.width,h/img.height);
  const sw=img.width*scale,sh=img.height*scale;
  const sx=x+(w-sw)/2,sy=y+(h-sh)/2;
  ctx.save();ctx.beginPath();ctx.rect(x,y,w,h);ctx.clip();
  ctx.drawImage(img,sx,sy,sw,sh);ctx.restore();
};

const wrapText=(ctx,text,x,y,maxW,lineH)=>{
  const words=text.split(" ");let line="";let ly=y;
  words.forEach(w=>{
    const test=line+w+" ";
    if(ctx.measureText(test).width>maxW&&line){ctx.fillText(line.trim(),x,ly);line=w+" ";ly+=lineH;}
    else line=test;
  });
  if(line)ctx.fillText(line.trim(),x,ly);
  return ly;
};

// ============ GEMINI ============
const geminiText=async prompt=>{
  try{
    const body={
      contents:[{parts:[{text:prompt}]}],
      generationConfig:{
        temperature:0.9,
        maxOutputTokens:512,
        thinkingConfig:{thinkingBudget:0}
      }
    };
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}`,
      {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    if(!res.ok){console.error("Gemini HTTP",res.status,await res.text());return "";}
    const data=await res.json();
    const cand=data.candidates?.[0];
    if(!cand)return "";
    const parts=cand.content?.parts||[];
    return parts.map(p=>p.text||"").filter(Boolean).join("\n").trim();
  }catch(e){console.error(e);return "";}
};

// ============ APP ============
function App(){
  const [tool,setTool]=useState("home");
  const [img,setImg]=useState(null);
  const [imgFile,setImgFile]=useState(null);
  const fileRef=useRef();

  // Editor
  const [filter,setFilter]=useState("none");
  const [format,setFormat]=useState("1/1");
  const [overlayText,setOverlayText]=useState("");
  const [overlayColor,setOverlayColor]=useState("#ffffff");
  const [overlaySize,setOverlaySize]=useState(48);
  const [overlayFont,setOverlayFont]=useState("Georgia,serif");
  const [overlayX,setOverlayX]=useState(50);
  const [overlayY,setOverlayY]=useState(85);
  const [overlayShadow,setOverlayShadow]=useState(true);
  const [overlayBg,setOverlayBg]=useState("none");
  const [customFilters,setCustomFilters]=useState(()=>{try{return JSON.parse(localStorage.getItem("hd_filters")||"[]");}catch{return[];}});
  const [cfName,setCfName]=useState("");
  const [cfB,setCfB]=useState(100),[cfC,setCfC]=useState(100),[cfS,setCfS]=useState(100),[cfSe,setCfSe]=useState(0),[cfH,setCfH]=useState(0);
  const [editing,setEditing]=useState("filtros");
  const [exportBusy,setExportBusy]=useState(false);

  // Modelos
  const [modelos,setModelos]=useState([]);
  const [modelosBusy,setModelosBusy]=useState(false);
  const [modelosText,setModelosText]=useState("");
  const [modelosTitulo,setModelosTitulo]=useState("");
  const [modelosSubtitulo,setModelosSubtitulo]=useState("");

  // Story
  const [storyTpl,setStoryTpl]=useState(STORY_TEMPLATES[0]);
  const [storyTitle,setStoryTitle]=useState("");
  const [storySub,setStorySub]=useState("");
  const [storyExtra,setStoryExtra]=useState("");
  const [storyResult,setStoryResult]=useState(null);
  const [storyUseImg,setStoryUseImg]=useState(false);
  const [aiStoryBusy,setAiStoryBusy]=useState(false);

  // Collage
  const [collageImgs,setCollageImgs]=useState([]);
  const [collageLayout,setCollageLayout]=useState("2x2");
  const [collageResult,setCollageResult]=useState(null);
  const collageRef=useRef();

  // Resize
  const [resizeSocial,setResizeSocial]=useState(SOCIAL_FORMATS[0]);
  const [resizeResult,setResizeResult]=useState(null);
  const [resizeFit,setResizeFit]=useState("cover");
  const [resizeBgColor,setResizeBgColor]=useState("#0a0a0a");

  // Agua
  const [aguaResult,setAguaResult]=useState(null);
  const [aguaPos,setAguaPos]=useState("bottomRight");
  const [aguaOpacity,setAguaOpacity]=useState(85);
  const [aguaSize,setAguaSize]=useState(4);
  const [aguaText,setAguaText]=useState("🌱 "+BRAND_NAME);

  // Acciones
  const pickFile=()=>fileRef.current?.click();
  const handleFile=e=>{
    const f=e.target.files?.[0];
    if(!f||!f.type.startsWith("image/"))return;
    if(img)URL.revokeObjectURL(img);
    setImg(URL.createObjectURL(f));setImgFile(f);
    e.target.value="";
  };
  const clearImg=()=>{if(img)URL.revokeObjectURL(img);setImg(null);setImgFile(null);};

  // Render editor canvas
  const renderEditorCanvas=async()=>{
    if(!img)return null;
    const fmt=SOCIAL_FORMATS.find(f=>f.id===format)||SOCIAL_FORMATS[0];
    const canvas=document.createElement("canvas");
    canvas.width=fmt.w;canvas.height=fmt.h;
    const ctx=canvas.getContext("2d");
    const im=await loadImage(img);
    const f=[...FILTERS,...customFilters].find(x=>x.id===filter);
    ctx.filter=f?f.filter:"none";
    drawImageCover(ctx,im,0,0,fmt.w,fmt.h);
    ctx.filter="none";
    if(overlayText){
      const fontPx=Math.round(overlaySize*fmt.w/400);
      ctx.font=`bold ${fontPx}px ${overlayFont}`;
      ctx.textAlign="center";ctx.textBaseline="middle";
      const x=fmt.w*overlayX/100,y=fmt.h*overlayY/100;
      // Ajuste por líneas: divide el texto en palabras y arma líneas que entran en el 88% del ancho
      const maxW=fmt.w*0.88;
      const lineH=fontPx*1.18;
      const lines=[];
      overlayText.split("\n").forEach(rawLine=>{
        const words=rawLine.split(" ");
        let cur="";
        words.forEach(w=>{
          const test=cur?cur+" "+w:w;
          if(ctx.measureText(test).width>maxW&&cur){lines.push(cur);cur=w;}
          else cur=test;
        });
        if(cur)lines.push(cur);
      });
      const totalH=lines.length*lineH;
      const startY=y-(totalH-lineH)/2;
      if(overlayBg!=="none"){
        const widest=Math.max(...lines.map(l=>ctx.measureText(l).width));
        const pad=fontPx*0.4;
        ctx.fillStyle=overlayBg==="brand"?"rgba(121,181,83,0.9)":overlayBg==="sun"?"rgba(249,168,37,0.92)":"rgba(0,0,0,0.6)";
        const bgX=x-widest/2-pad;
        const bgY=startY-fontPx/2-pad*0.6;
        const bgW=widest+pad*2;
        const bgH=totalH+pad*1.2;
        ctx.fillRect(bgX,bgY,bgW,bgH);
      }
      if(overlayShadow){ctx.shadowColor="rgba(0,0,0,0.75)";ctx.shadowBlur=fontPx*0.25;ctx.shadowOffsetY=fontPx*0.05;}
      ctx.fillStyle=overlayColor;
      lines.forEach((l,i)=>ctx.fillText(l,x,startY+i*lineH));
      ctx.shadowColor="transparent";ctx.shadowBlur=0;ctx.shadowOffsetY=0;
    }
    return canvas;
  };

  const exportEditor=async(action="download")=>{
    setExportBusy(true);
    try{
      const c=await renderEditorCanvas();
      if(!c){setExportBusy(false);return;}
      const dataUrl=c.toDataURL("image/jpeg",0.92);
      if(action==="download"){
        const a=document.createElement("a");a.href=dataUrl;a.download=`huerta-${format.replace("/","x")}.jpg`;a.click();
      }else if(action==="share"&&navigator.share){
        c.toBlob(async b=>{
          try{await navigator.share({files:[new File([b],"huerta.jpg",{type:"image/jpeg"})],title:BRAND_NAME});}catch{}
        },"image/jpeg",0.92);
      }else if(action==="copy"&&navigator.clipboard?.write){
        c.toBlob(async b=>{
          try{await navigator.clipboard.write([new ClipboardItem({"image/jpeg":b})]);alert("Imagen copiada al portapapeles");}catch{alert("Tu navegador no permite copiar imágenes. Probá con descargar.");}
        },"image/jpeg",0.92);
      }
    }catch(e){console.error(e);alert("Hubo un error al exportar: "+e.message);}
    setExportBusy(false);
  };

  // Filtro custom
  const cfStr=`brightness(${cfB}%) contrast(${cfC}%) saturate(${cfS}%) sepia(${cfSe}%) hue-rotate(${cfH}deg)`;
  const saveCustomFilter=()=>{
    if(!cfName.trim())return;
    const id="cf_"+Date.now();
    const next=[...customFilters,{id,label:"★ "+cfName,filter:cfStr}];
    setCustomFilters(next);localStorage.setItem("hd_filters",JSON.stringify(next));
    setCfName("");setFilter(id);setEditing("filtros");
  };
  const deleteCustomFilter=id=>{
    const next=customFilters.filter(f=>f.id!==id);
    setCustomFilters(next);localStorage.setItem("hd_filters",JSON.stringify(next));
    if(filter===id)setFilter("none");
  };

  // Helper: dibuja texto con wrap automático y auto-shrink si no entra
  // Devuelve la altura total usada (para encadenar elementos debajo si hace falta)
  const drawSmartText=(ctx,text,opts)=>{
    let {x,y,maxW,fontFamily,fontWeight="normal",fontStyle="normal",initialSize,minSize=14,color,align="center",baseline="middle",lineHeightMul=1.15,maxLines=4}=opts;
    let size=initialSize;
    let lines=[];
    // Achicar fuente progresivamente hasta que entre en maxLines
    while(size>=minSize){
      ctx.font=`${fontStyle} ${fontWeight} ${size}px ${fontFamily}`;
      lines=[];
      const words=(text||"").split(" ");
      let current="";
      for(const w of words){
        const test=current?current+" "+w:w;
        if(ctx.measureText(test).width<=maxW)current=test;
        else{
          if(current)lines.push(current);
          current=w;
          // Si una palabra sola no entra, recortarla
          if(ctx.measureText(current).width>maxW){
            // truncar con elipsis
            while(current.length>1&&ctx.measureText(current+"…").width>maxW)current=current.slice(0,-1);
            current=current+"…";
          }
        }
      }
      if(current)lines.push(current);
      if(lines.length<=maxLines)break;
      size-=2;
    }
    const lineH=size*lineHeightMul;
    const totalH=lineH*lines.length;
    ctx.fillStyle=color;
    ctx.textAlign=align;
    ctx.textBaseline=baseline;
    // Si baseline=middle, y es el centro vertical del bloque
    let startY;
    if(baseline==="middle")startY=y-totalH/2+lineH/2;
    else if(baseline==="top")startY=y;
    else startY=y;
    lines.forEach((l,i)=>ctx.fillText(l,x,startY+i*lineH));
    return {height:totalH,size,lines:lines.length};
  };

  // 4 modelos
  const buildModelo=async(style,im)=>{
    const canvas=document.createElement("canvas");
    canvas.width=1080;canvas.height=1080;
    const ctx=canvas.getContext("2d");
    const title=modelosTitulo||"Huerta SXXI";
    const sub=modelosSubtitulo||BRAND_NAME;

    if(style==="minimal"){
      // Imagen completa con franja inferior con título y subtítulo
      drawImageCover(ctx,im,0,0,1080,1080);
      ctx.fillStyle="rgba(10,10,10,0.85)";ctx.fillRect(0,760,1080,320);
      const tRes=drawSmartText(ctx,title.toUpperCase(),{
        x:540,y:855,maxW:980,fontFamily:"Georgia,serif",fontWeight:"bold",
        initialSize:72,minSize:36,color:"#fff",align:"center",baseline:"middle",maxLines:2
      });
      drawSmartText(ctx,sub,{
        x:540,y:855+tRes.height/2+30,maxW:980,fontFamily:"Georgia,serif",fontStyle:"italic",
        initialSize:26,minSize:18,color:"#a3d076",align:"center",baseline:"top",maxLines:2
      });
      ctx.fillStyle="#F9A825";ctx.fillRect(440,1010,200,4);
    }
    else if(style==="editorial"){
      // Imagen arriba, bloque tipográfico abajo
      drawImageCover(ctx,im,0,0,1080,560);
      ctx.fillStyle="#0a0a0a";ctx.fillRect(0,560,1080,520);
      ctx.fillStyle="#79B553";ctx.font="bold 22px 'Courier New',monospace";ctx.textAlign="left";ctx.textBaseline="top";
      ctx.fillText("— HUERTA AGROECOLÓGICA",60,610);
      const tRes=drawSmartText(ctx,title,{
        x:60,y:670,maxW:960,fontFamily:"Georgia,serif",fontWeight:"bold",
        initialSize:80,minSize:42,color:"#fff",align:"left",baseline:"top",maxLines:3
      });

  const generateCollage=async()=>{
    const layout=COLLAGE_LAYOUTS.find(l=>l.id===collageLayout);
    if(collageImgs.length<layout.min)return;
    const canvas=document.createElement("canvas");
    canvas.width=1080;canvas.height=1080;
    const ctx=canvas.getContext("2d");
    ctx.fillStyle="#0a0a0a";ctx.fillRect(0,0,1080,1080);
    const gap=10;
    try{
      const imgs=await Promise.all(collageImgs.slice(0,layout.max).map(u=>loadImage(u)));
      if(collageLayout==="2x2"){
        const s=(1080-gap*3)/2;
        const pos=[[gap,gap],[gap*2+s,gap],[gap,gap*2+s],[gap*2+s,gap*2+s]];
        imgs.forEach((im,i)=>pos[i]&&drawImageCover(ctx,im,pos[i][0],pos[i][1],s,s));
      }else if(collageLayout==="1+2"){
        const bigH=(1080-gap*3)*0.6,smH=1080-bigH-gap*3,smW=(1080-gap*3)/2;
        if(imgs[0])drawImageCover(ctx,imgs[0],gap,gap,1080-gap*2,bigH);
        if(imgs[1])drawImageCover(ctx,imgs[1],gap,bigH+gap*2,smW,smH);
        if(imgs[2])drawImageCover(ctx,imgs[2],smW+gap*2,bigH+gap*2,smW,smH);
      }else if(collageLayout==="3col"){
        const w=(1080-gap*4)/3;
        imgs.slice(0,3).forEach((im,i)=>drawImageCover(ctx,im,gap+i*(w+gap),gap,w,1080-gap*2));
      }else if(collageLayout==="1+3"){
        const bigW=(1080-gap*3)*0.65,restW=1080-bigW-gap*3;
        const smH=(1080-gap*4)/3;
        if(imgs[0])drawImageCover(ctx,imgs[0],gap,gap,bigW,1080-gap*2);
        [1,2,3].forEach((k,i)=>imgs[k]&&drawImageCover(ctx,imgs[k],bigW+gap*2,gap+i*(smH+gap),restW,smH));
      }
      ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(0,1020,1080,60);
      ctx.fillStyle="#fff";ctx.font="bold 24px Georgia,serif";ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText("🌱 "+BRAND_NAME,540,1050);
      setCollageResult(canvas.toDataURL("image/jpeg",0.92));
    }catch(e){alert("Hubo un error armando el collage");}
  };

      const boxH=fontPx*1.4;
      let bx,by;
      if(aguaPos==="bottomRight"){bx=im.width-boxW-20;by=im.height-boxH-20;}

      else if(aguaPos==="topRight"){bx=im.width-boxW-20;by=20;}
      else if(aguaPos==="topLeft"){bx=20;by=20;}
      else{bx=(im.width-boxW)/2;by=(im.height-boxH)/2;}
      ctx.globalAlpha=aguaOpacity/100*0.55;
      ctx.fillStyle="#0a0a0a";ctx.fillRect(bx,by,boxW,boxH);
      ctx.fillStyle="#79B553";ctx.fillRect(bx,by,6,boxH);
      ctx.globalAlpha=aguaOpacity/100;
      ctx.fillStyle="#fff";ctx.textBaseline="middle";ctx.textAlign="left";
      ctx.fillText(aguaText,bx+pad,by+boxH/2);
      ctx.globalAlpha=1;
      setAguaResult(canvas.toDataURL("image/jpeg",0.92));
    }catch(e){alert("Hubo un error al aplicar la marca de agua");}

                        {f.label}
                        {f.id.startsWith("cf_")&&<span onClick={e=>{e.stopPropagation();deleteCustomFilter(f.id);}} style={{position:"absolute",top:2,right:4,fontSize:10,color:"var(--muted)"}}>✕</span>}
                      </button>
                    ))}
                  </div>
                </Card>
              )}

              {editing==="texto"&&(
                <Card style={{marginBottom:14}}>
                  <Lbl>Texto sobre la imagen</Lbl>
                  <textarea value={overlayText} onChange={e=>setOverlayText(e.target.value)} placeholder="Escribí tu frase. El texto se ajusta solo en varias líneas si es largo." rows={2} style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid var(--border)",borderRadius:8,padding:11,color:"#fff",fontSize:14,marginBottom:12,fontFamily:"Georgia,serif",resize:"vertical",minHeight:60}}/>
                  {overlayText&&(
                    <>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                        <div><Lbl>Color del texto</Lbl>
                          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                            {BRAND_PALETTE.slice(0,6).map(c=><button key={c.hex} onClick={()=>setOverlayColor(c.hex)} title={c.name} style={{width:26,height:26,borderRadius:"50%",border:overlayColor===c.hex?"2px solid #fff":"1px solid var(--border)",background:c.hex,cursor:"pointer"}}/>)}
                            <input type="color" value={overlayColor} onChange={e=>setOverlayColor(e.target.value)} style={{width:26,height:26,padding:0,borderRadius:"50%"}}/>
                          </div>
                        </div>
                        <div><Lbl>Tamaño — {overlaySize}</Lbl>
                          <input type="range" min={16} max={120} value={overlaySize} onChange={e=>setOverlaySize(+e.target.value)} style={{width:"100%"}}/>
                        </div>
                      </div>
                      <Lbl>Tipografía</Lbl>
                      <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>
                        {FONTS.map(f=><Pill key={f.v} active={overlayFont===f.v} onClick={()=>setOverlayFont(f.v)}>{f.l}</Pill>)}
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                        <div><Lbl>Horizontal — {overlayX}%</Lbl><input type="range" min={5} max={95} value={overlayX} onChange={e=>setOverlayX(+e.target.value)} style={{width:"100%"}}/></div>
                        <div><Lbl>Vertical — {overlayY}%</Lbl><input type="range" min={5} max={95} value={overlayY} onChange={e=>setOverlayY(+e.target.value)} style={{width:"100%"}}/></div>
                      </div>
                      <Lbl>Fondo del texto</Lbl>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                        <Pill active={overlayBg==="none"} onClick={()=>setOverlayBg("none")}>Sin fondo</Pill>
                        <Pill active={overlayBg==="dark"} onClick={()=>setOverlayBg("dark")}>Oscuro</Pill>
                        <Pill active={overlayBg==="brand"} onClick={()=>setOverlayBg("brand")} color="#79B553">Verde</Pill>
                        <Pill active={overlayBg==="sun"} onClick={()=>setOverlayBg("sun")} color="#F9A825">Amarillo</Pill>
                        <Pill active={overlayShadow} onClick={()=>setOverlayShadow(!overlayShadow)}>Con sombra</Pill>
                      </div>
                    </>
                  )}
                </Card>
              )}

              {editing==="formato"&&(
                <Card style={{marginBottom:14}}>
                  <Lbl>Formato de salida</Lbl>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    {SOCIAL_FORMATS.map(f=>(
                      <button key={f.id} onClick={()=>setFormat(f.id)} style={{padding:"14px",borderRadius:10,border:`2px solid ${format===f.id?"var(--sun)":"transparent"}`,background:format===f.id?"rgba(249,168,37,0.12)":"rgba(255,255,255,0.05)",color:"#fff",cursor:"pointer",fontFamily:"Georgia,serif",textAlign:"left"}}>
                        <div style={{fontSize:22,marginBottom:6,color:"var(--green)"}}>{f.icon}</div>
                        <div style={{fontWeight:700,fontSize:13}}>{f.label}</div>
                        <div className="mono" style={{color:"var(--muted)",marginTop:3,fontSize:9}}>{f.size}</div>
                      </button>
                    ))}
                  </div>
                </Card>
              )}

              {editing==="personalizado"&&(
                <Card style={{marginBottom:14}}>
                  <Lbl>Armá tu propio filtro</Lbl>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                    <div><Lbl>Brillo — {cfB}</Lbl><input type="range" min={50} max={150} value={cfB} onChange={e=>setCfB(+e.target.value)} style={{width:"100%"}}/></div>
                    <div><Lbl>Contraste — {cfC}</Lbl><input type="range" min={50} max={200} value={cfC} onChange={e=>setCfC(+e.target.value)} style={{width:"100%"}}/></div>
                    <div><Lbl>Saturación — {cfS}</Lbl><input type="range" min={0} max={200} value={cfS} onChange={e=>setCfS(+e.target.value)} style={{width:"100%"}}/></div>
                    <div><Lbl>Sepia — {cfSe}</Lbl><input type="range" min={0} max={100} value={cfSe} onChange={e=>setCfSe(+e.target.value)} style={{width:"100%"}}/></div>
                  </div>
                  <Lbl>Tono — {cfH}°</Lbl><input type="range" min={-180} max={180} value={cfH} onChange={e=>setCfH(+e.target.value)} style={{width:"100%",marginBottom:12}}/>
                  <div style={{display:"flex",gap:8}}>
                    <input value={cfName} onChange={e=>setCfName(e.target.value)} placeholder="Ponele un nombre" style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid var(--border)",borderRadius:8,padding:10,color:"#fff",fontSize:13,fontFamily:"Georgia,serif"}}/>
                    <Btn onClick={saveCustomFilter} disabled={!cfName.trim()} style={{width:"auto",padding:"10px 18px",fontSize:12}}>Guardar</Btn>
                  </div>
                  <div className="editorial" style={{marginTop:10,fontSize:12,color:"var(--muted)",fontStyle:"italic"}}>La vista previa se actualiza arriba. Jugá con los valores hasta que te guste.</div>
                </Card>
              )}

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                <Btn onClick={()=>exportEditor("copy")} disabled={exportBusy} variant="soft" style={{fontSize:12,padding:"12px 4px"}}>📋 Copiar</Btn>
                <Btn onClick={()=>exportEditor("share")} disabled={exportBusy} variant="soft" style={{fontSize:12,padding:"12px 4px"}}>↗ Compartir</Btn>
                <Btn onClick={()=>exportEditor("download")} disabled={exportBusy} variant="sun" style={{fontSize:12,padding:"12px 4px"}}>{exportBusy?"⏳":"⬇ Descargar"}</Btn>
              </div>
            </div>
          )}

          {/* ============ MODELOS IA ============ */}
          {tool==="modelos"&&(
            <div className="fade">
              <Card style={{marginBottom:14}}>
                <div className="editorial" style={{fontSize:13,color:"var(--muted)",marginBottom:12,fontStyle:"italic",lineHeight:1.5}}>La IA te arma cuatro versiones distintas a partir de tu imagen. Elegís la que más te guste.</div>
                <Lbl>Título del posteo</Lbl>
                <input value={modelosTitulo} onChange={e=>setModelosTitulo(e.target.value)} placeholder="Por ejemplo: Cosecha de tomate" style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid var(--border)",borderRadius:8,padding:10,color:"#fff",fontSize:14,marginBottom:10,fontFamily:"Georgia,serif"}}/>
                <Lbl>Subtítulo (opcional)</Lbl>
                <input value={modelosSubtitulo} onChange={e=>setModelosSubtitulo(e.target.value)} placeholder="Una frase que acompañe" style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid var(--border)",borderRadius:8,padding:10,color:"#fff",fontSize:13,marginBottom:10,fontFamily:"Georgia,serif"}}/>
                <Lbl>O contame el contexto y la IA se encarga</Lbl>
                <textarea value={modelosText} onChange={e=>setModelosText(e.target.value)} placeholder="Por ejemplo: Estamos cosechando albahaca orgánica y queremos vender ramitos..." style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid var(--border)",borderRadius:8,padding:10,color:"#fff",fontSize:13,resize:"vertical",minHeight:70,marginBottom:12,fontFamily:"Georgia,serif"}}/>
                <Btn onClick={generarModelos} disabled={modelosBusy} variant="sun">{modelosBusy?"Dibujando los cuatro modelos...":"✦ Generar cuatro modelos"}</Btn>
              </Card>

              {modelos.length>0&&(
                <>
                  <Lbl style={{marginLeft:4}}>Tocá el que te guste para descargarlo</Lbl>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    {modelos.map(m=>(
                      <div key={m.style} style={{borderRadius:12,overflow:"hidden",border:"1px solid var(--border-strong)",background:"rgba(0,0,0,0.4)"}}>
                        <img src={m.url} alt={m.label} style={{width:"100%",aspectRatio:"1",objectFit:"cover",display:"block"}}/>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px"}}>
                          <span className="mono" style={{color:"var(--green-l)",fontSize:10}}>{m.label}</span>
                          <button onClick={()=>download(m.url,`huerta-${m.style}.jpg`)} style={{background:"var(--green)",border:"none",color:"#fff",borderRadius:6,padding:"6px 12px",fontSize:11,cursor:"pointer",fontFamily:"Georgia,serif",fontWeight:700}}>⬇ Descargar</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </>
              )}
            </div>
          )}

          {/* ============ STORY TEMPLATES ============ */}
          {tool==="story"&&(
            <div className="fade">
              <Lbl style={{marginLeft:4}}>Elegí una plantilla</Lbl>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
                {STORY_TEMPLATES.map(t=>(
                  <button key={t.id} onClick={()=>setStoryTpl(t)} style={{padding:"14px 12px",borderRadius:10,border:`2px solid ${storyTpl.id===t.id?t.accent:"transparent"}`,background:storyTpl.id===t.id?t.bg:"rgba(255,255,255,0.05)",color:"#fff",cursor:"pointer",fontFamily:"Georgia,serif",textAlign:"left",transition:"all 0.2s"}}>
                    <div style={{fontSize:14,fontWeight:700,marginBottom:3}}>{t.label}</div>
                    <div className="mono" style={{color:"rgba(255,255,255,0.7)",fontSize:9}}>{t.title}</div>
                  </button>
                ))}
              </div>

              <Card style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <Lbl style={{marginBottom:0}}>Tu texto</Lbl>
                  <button onClick={sugerirStoryIA} disabled={aiStoryBusy} style={{background:"rgba(249,168,37,0.15)",border:"1px solid var(--sun)",color:"var(--sun)",borderRadius:6,padding:"5px 12px",fontSize:11,cursor:"pointer",fontFamily:"Georgia,serif",fontWeight:700}}>{aiStoryBusy?"⏳":"✦ Sugerencia IA"}</button>
                </div>
                <input value={storyTitle} onChange={e=>setStoryTitle(e.target.value)} placeholder={storyTpl.title} style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid var(--border)",borderRadius:8,padding:10,color:"#fff",fontSize:14,marginBottom:8,fontFamily:"Georgia,serif"}}/>
                <input value={storySub} onChange={e=>setStorySub(e.target.value)} placeholder={storyTpl.subtitle} style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid var(--border)",borderRadius:8,padding:10,color:"#fff",fontSize:13,marginBottom:8,fontFamily:"Georgia,serif"}}/>
                <textarea value={storyExtra} onChange={e=>setStoryExtra(e.target.value)} placeholder="Texto extra (opcional)" style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid var(--border)",borderRadius:8,padding:10,color:"#fff",fontSize:13,resize:"vertical",minHeight:60,fontFamily:"Georgia,serif",marginBottom:10}}/>
                {img&&(
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <input type="checkbox" id="useimg" checked={storyUseImg} onChange={e=>setStoryUseImg(e.target.checked)} style={{accentColor:"var(--green)"}}/>
                    <label htmlFor="useimg" className="editorial" style={{fontSize:13,color:"var(--muted)",cursor:"pointer"}}>Incluir mi imagen adentro del diseño</label>
                  </div>
                )}
              </Card>

              <Btn onClick={generateStory} variant="sun" style={{marginBottom:14}}>Generar Story</Btn>

              {storyResult&&(
                <Card style={{marginBottom:10}}>
                  <Lbl>Resultado</Lbl>
                  <img src={storyResult} alt="" style={{width:"100%",maxWidth:260,margin:"0 auto",display:"block",borderRadius:10,border:"1px solid var(--border-strong)"}}/>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:12}}>
                    <Btn onClick={()=>download(storyResult,"huerta-story.jpg")} style={{fontSize:12,padding:"11px"}}>⬇ Descargar</Btn>
                    <Btn onClick={async()=>{if(navigator.share){try{const b=await (await fetch(storyResult)).blob();await navigator.share({files:[new File([b],"story.jpg",{type:"image/jpeg"})]});}catch{}}}} variant="soft" style={{fontSize:12,padding:"11px"}}>↗ Compartir</Btn>
                  </div>
                </Card>
              )}
            </div>
          )}

          {/* ============ COLLAGE ============ */}
          {tool==="collage"&&(
            <div className="fade">
              <Card style={{marginBottom:14}}>
                <Lbl>Elegí la disposición</Lbl>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
                  {COLLAGE_LAYOUTS.map(l=>(
                    <button key={l.id} onClick={()=>setCollageLayout(l.id)} style={{padding:"12px",borderRadius:10,border:`2px solid ${collageLayout===l.id?"var(--green)":"transparent"}`,background:collageLayout===l.id?"rgba(121,181,83,0.18)":"rgba(255,255,255,0.05)",color:"#fff",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:13,fontWeight:700}}>{l.label}<div className="mono" style={{color:"var(--muted)",marginTop:3,fontSize:9}}>{l.min} a {l.max} fotos</div></button>
                  ))}
                </div>

                <Lbl>Fotos — {collageImgs.length} cargadas</Lbl>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:10}}>
                  {collageImgs.map((u,i)=>(
                    <div key={i} style={{position:"relative",aspectRatio:"1",borderRadius:8,overflow:"hidden",background:"#000"}}>
                      <img src={u} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                      <button onClick={()=>removeCollageImg(i)} style={{position:"absolute",top:2,right:2,background:"rgba(0,0,0,0.8)",border:"none",color:"#fff",borderRadius:"50%",width:22,height:22,cursor:"pointer",fontSize:11}}>✕</button>
                    </div>
                  ))}
                  {collageImgs.length<4&&(
                    <button onClick={()=>collageRef.current?.click()} style={{aspectRatio:"1",borderRadius:8,border:"2px dashed var(--border-strong)",background:"transparent",color:"var(--muted)",cursor:"pointer",fontSize:24}}>+</button>
                  )}
                </div>
                <input ref={collageRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={addCollageImgs}/>
              </Card>

              <Btn onClick={generateCollage} disabled={collageImgs.length<(COLLAGE_LAYOUTS.find(l=>l.id===collageLayout)?.min||2)} variant="sun" style={{marginBottom:14}}>Armar el collage</Btn>

              {collageResult&&(
                <Card>
                  <Lbl>Resultado</Lbl>
                  <img src={collageResult} alt="" style={{width:"100%",maxWidth:300,margin:"0 auto",display:"block",borderRadius:10}}/>
                  <Btn onClick={()=>download(collageResult,"huerta-collage.jpg")} style={{marginTop:12}}>⬇ Descargar</Btn>
                </Card>
              )}
            </div>
          )}

          {/* ============ RESIZE ============ */}
          {tool==="resize"&&(
            <div className="fade">
              <Card style={{marginBottom:14}}>
                <img src={img} alt="" style={{width:"100%",maxWidth:240,margin:"0 auto 14px",display:"block",borderRadius:10,maxHeight:200,objectFit:"contain",background:"#000"}}/>
                <Lbl>Medida para red social</Lbl>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
                  {SOCIAL_FORMATS.concat([{id:"fb",label:"Facebook",size:"1200×630",icon:"▬",w:1200,h:630},{id:"yt",label:"YouTube",size:"1280×720",icon:"▶",w:1280,h:720}]).map(f=>(
                    <button key={f.id} onClick={()=>setResizeSocial(f)} style={{padding:"12px",borderRadius:10,border:`2px solid ${resizeSocial.id===f.id?"var(--green)":"transparent"}`,background:resizeSocial.id===f.id?"rgba(121,181,83,0.15)":"rgba(255,255,255,0.05)",color:"#fff",cursor:"pointer",fontFamily:"Georgia,serif",textAlign:"left"}}>
                      <div style={{fontSize:18,marginBottom:4,color:"var(--green)"}}>{f.icon}</div>
                      <div style={{fontWeight:700,fontSize:13}}>{f.label}</div>
                      <div className="mono" style={{color:"var(--muted)",fontSize:9}}>{f.size}</div>
                    </button>
                  ))}
                </div>
                <Lbl>Cómo encajar la imagen</Lbl>
                <div style={{display:"flex",gap:6,marginBottom:12}}>
                  <Pill active={resizeFit==="cover"} onClick={()=>setResizeFit("cover")}>Llenar (recorta)</Pill>
                  <Pill active={resizeFit==="contain"} onClick={()=>setResizeFit("contain")}>Completa (con bordes)</Pill>
                </div>
                {resizeFit==="contain"&&(<>
                  <Lbl>Color del borde</Lbl>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {BRAND_PALETTE.map(c=><button key={c.hex} onClick={()=>setResizeBgColor(c.hex)} title={c.name} style={{width:28,height:28,borderRadius:6,border:resizeBgColor===c.hex?"2px solid #fff":"1px solid var(--border)",background:c.hex,cursor:"pointer"}}/>)}
                    <input type="color" value={resizeBgColor} onChange={e=>setResizeBgColor(e.target.value)} style={{width:28,height:28,padding:0,borderRadius:6}}/>
                  </div>
                </>)}
              </Card>
              <Btn onClick={generateResize} variant="sun" style={{marginBottom:14}}>Redimensionar</Btn>
              {resizeResult&&(
                <Card>
                  <Lbl>Resultado · {resizeSocial.size}</Lbl>
                  <img src={resizeResult} alt="" style={{width:"100%",maxWidth:300,margin:"0 auto",display:"block",borderRadius:10,background:"#000"}}/>
                  <Btn onClick={()=>download(resizeResult,`huerta-${resizeSocial.label.toLowerCase().replace(/\s/g,"-")}.jpg`)} style={{marginTop:12}}>⬇ Descargar</Btn>
                </Card>
              )}
            </div>
          )}

          {/* ============ MARCA DE AGUA ============ */}
          {tool==="agua"&&(
            <div className="fade">
              <Card style={{marginBottom:14}}>
                <img src={img} alt="" style={{width:"100%",maxWidth:240,margin:"0 auto 14px",display:"block",borderRadius:10,maxHeight:200,objectFit:"contain",background:"#000"}}/>
                <Lbl>Texto de la firma</Lbl>
                <input value={aguaText} onChange={e=>setAguaText(e.target.value)} style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid var(--border)",borderRadius:8,padding:10,color:"#fff",fontSize:13,marginBottom:12,fontFamily:"Georgia,serif"}}/>
                <Lbl>Posición</Lbl>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:5,marginBottom:12}}>
                  {[{id:"topLeft",l:"↖ Arriba izq."},{id:"center",l:"◉ Centro"},{id:"topRight",l:"↗ Arriba der."},{id:"bottomLeft",l:"↙ Abajo izq."},{id:"bottomRight",l:"↘ Abajo der."}].map(p=>(
                    <button key={p.id} onClick={()=>setAguaPos(p.id)} style={{padding:"10px 6px",borderRadius:6,border:`2px solid ${aguaPos===p.id?"var(--green)":"transparent"}`,background:aguaPos===p.id?"rgba(121,181,83,0.15)":"rgba(255,255,255,0.05)",color:"#fff",fontSize:11,cursor:"pointer",fontFamily:"Georgia,serif"}}>{p.l}</button>
                  ))}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <div><Lbl>Opacidad — {aguaOpacity}%</Lbl><input type="range" min={20} max={100} value={aguaOpacity} onChange={e=>setAguaOpacity(+e.target.value)} style={{width:"100%"}}/></div>
                  <div><Lbl>Tamaño — {aguaSize}%</Lbl><input type="range" min={2} max={10} value={aguaSize} onChange={e=>setAguaSize(+e.target.value)} style={{width:"100%"}}/></div>
                </div>
              </Card>
              <Btn onClick={applyWatermark} variant="sun" style={{marginBottom:14}}>Aplicar marca de agua</Btn>
              {aguaResult&&(
                <Card>
                  <Lbl>Resultado</Lbl>
                  <img src={aguaResult} alt="" style={{width:"100%",maxWidth:300,margin:"0 auto",display:"block",borderRadius:10}}/>
                  <Btn onClick={()=>download(aguaResult,"huerta-marca.jpg")} style={{marginTop:12}}>⬇ Descargar</Btn>
                </Card>
              )}
            </div>
          )}
          </>
          )}
        </main>
      )}

      {/* FOOTER */}
      <footer style={{textAlign:"center",padding:"20px 16px 16px",borderTop:"1px solid var(--border)"}}>
        <div className="mono" style={{color:"var(--muted)",marginBottom:6}}>Huerta SXXI · Estudio · v3</div>
        <div className="editorial" style={{fontSize:11,color:"rgba(245,242,232,0.3)",fontStyle:"italic"}}>Hecho con cariño para la huerta.</div>
      </footer>

      <div className="stripe"/>
    </div>
  );
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
<script>
  if("serviceWorker" in navigator){
    window.addEventListener("load",()=>{
      navigator.serviceWorker.register("sw-diseno.js").catch(()=>{});
    });
  }
</script>
</body>
</html>
