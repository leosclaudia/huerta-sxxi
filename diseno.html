<style>
  :root{
    /* Paleta editorial: negro profundo + verde huerta + amarillo sol + blanco */

    --bg2:#141414;
    --surface:rgba(255,255,255,0.05);

    --green-d:#4a7a2e;

    --cream:#f5f2e8;

  ::-webkit-scrollbar-thumb{background:var(--green);border-radius:4px;opacity:0.6;}
  input[type=range]{accent-color:var(--green);}
  input[type=color]{cursor:pointer;border:none;border-radius:6px;background:transparent;}
  textarea,input,select{outline:none;}
  /* Tipografía editorial */
  .brand{font-family:Georgia,serif;font-weight:800;letter-spacing:-0.02em;}
  .editorial{font-family:Georgia,serif;font-style:italic;}
  .mono{font-family:'Courier New',monospace;letter-spacing:0.08em;text-transform:uppercase;font-size:10px;}
  .divider{border:none;height:1px;background:linear-gradient(90deg,transparent,var(--border-strong),transparent);margin:18px 0;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .spin{animation:spin 0.8s linear infinite;display:inline-block;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .fade{animation:fadeUp 0.35s cubic-bezier(.22,.61,.36,1);}
  /* Franja decorativa editorial */
  .stripe{height:3px;background:repeating-linear-gradient(90deg,var(--green) 0 16px,transparent 16px 20px,var(--sun) 20px 30px,transparent 30px 34px);}
  /* Fondo checker para transparencias */
  .checker{background-image:linear-gradient(45deg,#222 25%,transparent 25%),linear-gradient(-45deg,#222 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#222 75%),linear-gradient(-45deg,transparent 75%,#222 75%);background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0;}
</style>

<script type="text/babel">
const {useState,useRef,useCallback,useEffect}=React;

// ============ CONSTANTES ============

const clearApiKey=()=>{try{localStorage.removeItem(API_KEY_STORAGE);}catch{}};

  {id:"vintage",label:"Vintage",filter:"sepia(0.5) saturate(1.2) brightness(0.95)"},
  {id:"dramatico",label:"Dramático",filter:"contrast(1.35) brightness(0.9) saturate(1.1)"},

  {id:"tierra",label:"Tierra",filter:"sepia(0.25) saturate(1.3) contrast(1.1)"},

const FONTS=[

  {v:"system-ui,-apple-system,sans-serif",l:"Moderna"},
  {v:"Impact,fantasy",l:"Impacto"},
  {v:"'Courier New',monospace",l:"Mono"},
  {v:"'Trebuchet MS',sans-serif",l:"Trebuchet"},
  {v:"'Times New Roman',serif",l:"Times"},
  {v:"Verdana,sans-serif",l:"Verdana"},
];

// Paleta de marca basada en el logo real
const BRAND_PALETTE=[

  {name:"Verde Oscuro",hex:"#4a7a2e"},
  {name:"Verde Claro",hex:"#a3d076"},

  {name:"Crema",hex:"#f5f2e8"},

const STORY_TEMPLATES=[
  {id:"cosecha",label:"🥬 Cosecha",bg:"#4a7a2e",bg2:"#2a4e18",accent:"#a3d076",title:"COSECHA DEL DÍA",subtitle:"De la tierra a tu mesa"},
  {id:"taller",label:"📚 Taller",bg:"#2c5282",bg2:"#1a365d",accent:"#9ec5fe",title:"NUEVO TALLER",subtitle:"Aprendé agroecología con nosotros"},

// ============ UI HELPERS ============
const Card=({children,style,onClick,active})=>(
  <div onClick={onClick} style={{background:active?"rgba(121,181,83,0.12)":"var(--surface)",border:`1px solid ${active?"var(--green)":"var(--border)"}`,borderRadius:14,padding:14,cursor:onClick?"pointer":"default",transition:"all 0.2s",...style}}>{children}</div>
);
const Lbl=({children,style})=>(

  return <button onClick={onClick} disabled={disabled} style={{padding:"12px 18px",borderRadius:8,border,background:disabled?"rgba(255,255,255,0.05)":bg,color:disabled?"rgba(255,255,255,0.3)":"#fff",fontWeight:700,fontSize:14,cursor:disabled?"not-allowed":"pointer",width:"100%",transition:"all 0.2s",letterSpacing:0.3,fontFamily:"Georgia,serif",...style}}>{children}</button>;
};
const Pill=({active,children,onClick,color})=>(
  <button onClick={onClick} style={{padding:"7px 14px",borderRadius:20,border:`1px solid ${active?(color||"var(--green)"):"var(--border)"}`,background:active?(color?color+"26":"rgba(121,181,83,0.15)"):"transparent",color:active?(color||"var(--green-l)"):"var(--muted)",fontSize:12,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"Georgia,serif",transition:"all 0.2s"}}>{children}</button>
);

// ============ HELPERS CANVAS ============
const loadImage=src=>new Promise((res,rej)=>{const i=new Image();i.crossOrigin="anonymous";i.onload=()=>res(i);i.onerror=rej;i.src=src;});

const drawImageCover=(ctx,img,x,y,w,h)=>{
  const scale=Math.max(w/img.width,h/img.height);
  const sw=img.width*scale,sh=img.height*scale;
  const sx=x+(w-sw)/2,sy=y+(h-sh)/2;
  ctx.save();ctx.beginPath();ctx.rect(x,y,w,h);ctx.clip();
  ctx.drawImage(img,sx,sy,sw,sh);ctx.restore();
};

const wrapText=(ctx,text,x,y,maxW,lineH)=>{
  const words=text.split(" ");let line="";let ly=y;
  words.forEach(w=>{
    const test=line+w+" ";
    if(ctx.measureText(test).width>maxW&&line){ctx.fillText(line.trim(),x,ly);line=w+" ";ly+=lineH;}
    else line=test;
  });
  if(line)ctx.fillText(line.trim(),x,ly);
  return ly;
};

// ============ GEMINI ============
// Estado global del estado de la API key (true = falta o falló)
let __apiKeyMissing=false;
const __apiKeyListeners=[];
const onApiKeyMissing=cb=>{__apiKeyListeners.push(cb);};
const flagApiKeyMissing=msg=>{
  __apiKeyMissing=true;
  __apiKeyListeners.forEach(cb=>cb(msg||"Falta configurar la API key"));
};

const geminiText=async prompt=>{
  const key=getApiKey();
  if(!key){flagApiKeyMissing("Falta configurar la API key de Gemini");return "";}
  try{
    const body={
      contents:[{parts:[{text:prompt}]}],
      generationConfig:{
        temperature:0.9,
        maxOutputTokens:512,
        thinkingConfig:{thinkingBudget:0}
      }
    };
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,
      {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    if(!res.ok){
      const txt=await res.text();
      console.error("Gemini HTTP",res.status,txt);
      if(res.status===403||res.status===401||res.status===400){
        flagApiKeyMissing(`Tu API key parece estar bloqueada o ser inválida (error ${res.status}). Generá una nueva en aistudio.google.com/app/apikey y volvé a guardarla.`);
      }
      return "";
    }
    const data=await res.json();
    const cand=data.candidates?.[0];
    if(!cand)return "";
    const parts=cand.content?.parts||[];
    return parts.map(p=>p.text||"").filter(Boolean).join("\n").trim();
  }catch(e){console.error(e);return "";}
};

// ============ APP ============
function App(){
  const [tool,setTool]=useState("home");
  const [img,setImg]=useState(null);
  const [imgFile,setImgFile]=useState(null);
  const fileRef=useRef();

  // API Key
  const [apiKeyModal,setApiKeyModal]=useState(false);
  const [apiKeyDraft,setApiKeyDraft]=useState("");
  const [apiKeyMessage,setApiKeyMessage]=useState("");
  const [hasApiKey,setHasApiKey]=useState(()=>!!getApiKey());

  // Suscribirse a errores de API key
  useEffect(()=>{
    const handler=msg=>{
      setApiKeyMessage(msg);
      setApiKeyDraft(getApiKey());
      setApiKeyModal(true);
      setHasApiKey(false);
    };
    onApiKeyMissing(handler);
  },[]);

  const saveApiKeyDraft=()=>{
    const k=apiKeyDraft.trim();
    if(!k)return;
    setApiKey(k);
    setHasApiKey(true);
    setApiKeyModal(false);
    setApiKeyMessage("");
  };
  const clearStoredKey=()=>{
    if(!confirm("¿Borrar la API key guardada en este dispositivo?"))return;
    clearApiKey();
    setApiKeyDraft("");
    setHasApiKey(false);
  };

  // Editor
  const [filter,setFilter]=useState("none");
  const [format,setFormat]=useState("1/1");
  const [overlayText,setOverlayText]=useState("");
  const [overlayColor,setOverlayColor]=useState("#ffffff");
  const [overlaySize,setOverlaySize]=useState(48);
  const [overlayFont,setOverlayFont]=useState("Georgia,serif");
  const [overlayX,setOverlayX]=useState(50);
  const [overlayY,setOverlayY]=useState(85);
  const [overlayShadow,setOverlayShadow]=useState(true);
  const [overlayBg,setOverlayBg]=useState("none");
  const [customFilters,setCustomFilters]=useState(()=>{try{return JSON.parse(localStorage.getItem("hd_filters")||"[]");}catch{return[];}});
  const [cfName,setCfName]=useState("");
  const [cfB,setCfB]=useState(100),[cfC,setCfC]=useState(100),[cfS,setCfS]=useState(100),[cfSe,setCfSe]=useState(0),[cfH,setCfH]=useState(0);
  const [editing,setEditing]=useState("filtros");
  const [exportBusy,setExportBusy]=useState(false);

  // Modelos
  const [modelos,setModelos]=useState([]);
  const [modelosBusy,setModelosBusy]=useState(false);
  const [modelosText,setModelosText]=useState("");
  const [modelosTitulo,setModelosTitulo]=useState("");
  const [modelosSubtitulo,setModelosSubtitulo]=useState("");
  const [modelosImgs,setModelosImgs]=useState([]); // URLs blob de imágenes adicionales (sin límite)
  const modelosImgsRef=useRef();

  // Story
  const [storyTpl,setStoryTpl]=useState(STORY_TEMPLATES[0]);
  const [storyTitle,setStoryTitle]=useState("");
  const [storySub,setStorySub]=useState("");
  const [storyExtra,setStoryExtra]=useState("");
  const [storyResult,setStoryResult]=useState(null);
  const [storyUseImg,setStoryUseImg]=useState(false);
  const [aiStoryBusy,setAiStoryBusy]=useState(false);

  // Collage
  const [collageImgs,setCollageImgs]=useState([]);
  const [collageLayout,setCollageLayout]=useState("2x2");
  const [collageResult,setCollageResult]=useState(null);
  const collageRef=useRef();

  // Resize
  const [resizeSocial,setResizeSocial]=useState(SOCIAL_FORMATS[0]);
  const [resizeResult,setResizeResult]=useState(null);
  const [resizeFit,setResizeFit]=useState("cover");
  const [resizeBgColor,setResizeBgColor]=useState("#0a0a0a");

  // Agua
  const [aguaResult,setAguaResult]=useState(null);
  const [aguaPos,setAguaPos]=useState("bottomRight");
  const [aguaOpacity,setAguaOpacity]=useState(85);
  const [aguaSize,setAguaSize]=useState(4);
  const [aguaText,setAguaText]=useState("🌱 "+BRAND_NAME);

  // Acciones
  const pickFile=()=>fileRef.current?.click();
  const handleFile=e=>{
    const f=e.target.files?.[0];
    if(!f||!f.type.startsWith("image/"))return;
    if(img)URL.revokeObjectURL(img);
    setImg(URL.createObjectURL(f));setImgFile(f);
    e.target.value="";
  };
  const clearImg=()=>{if(img)URL.revokeObjectURL(img);setImg(null);setImgFile(null);};

  // Render editor canvas
  const renderEditorCanvas=async()=>{
    if(!img)return null;
    const fmt=SOCIAL_FORMATS.find(f=>f.id===format)||SOCIAL_FORMATS[0];
    const canvas=document.createElement("canvas");
    canvas.width=fmt.w;canvas.height=fmt.h;
    const ctx=canvas.getContext("2d");
    const im=await loadImage(img);
    const f=[...FILTERS,...customFilters].find(x=>x.id===filter);
    ctx.filter=f?f.filter:"none";
    drawImageCover(ctx,im,0,0,fmt.w,fmt.h);
    ctx.filter="none";
    if(overlayText){
      const fontPx=Math.round(overlaySize*fmt.w/400);
      ctx.font=`bold ${fontPx}px ${overlayFont}`;
      ctx.textAlign="center";ctx.textBaseline="middle";
      const x=fmt.w*overlayX/100,y=fmt.h*overlayY/100;
      // Ajuste por líneas: divide el texto en palabras y arma líneas que entran en el 88% del ancho
      const maxW=fmt.w*0.88;
      const lineH=fontPx*1.18;
      const lines=[];
      overlayText.split("\n").forEach(rawLine=>{
        const words=rawLine.split(" ");
        let cur="";
        words.forEach(w=>{
          const test=cur?cur+" "+w:w;
          if(ctx.measureText(test).width>maxW&&cur){lines.push(cur);cur=w;}
          else cur=test;
        });
        if(cur)lines.push(cur);
      });
      const totalH=lines.length*lineH;
      const startY=y-(totalH-lineH)/2;
      if(overlayBg!=="none"){
        const widest=Math.max(...lines.map(l=>ctx.measureText(l).width));
        const pad=fontPx*0.4;
        ctx.fillStyle=overlayBg==="brand"?"rgba(121,181,83,0.9)":overlayBg==="sun"?"rgba(249,168,37,0.92)":"rgba(0,0,0,0.6)";
        const bgX=x-widest/2-pad;
        const bgY=startY-fontPx/2-pad*0.6;
        const bgW=widest+pad*2;
        const bgH=totalH+pad*1.2;
        ctx.fillRect(bgX,bgY,bgW,bgH);
      }
      if(overlayShadow){ctx.shadowColor="rgba(0,0,0,0.75)";ctx.shadowBlur=fontPx*0.25;ctx.shadowOffsetY=fontPx*0.05;}
      ctx.fillStyle=overlayColor;
      lines.forEach((l,i)=>ctx.fillText(l,x,startY+i*lineH));
      ctx.shadowColor="transparent";ctx.shadowBlur=0;ctx.shadowOffsetY=0;
    }
    return canvas;
  };

  const exportEditor=async(action="download")=>{
    setExportBusy(true);
    try{
      const c=await renderEditorCanvas();
      if(!c){setExportBusy(false);return;}
      const dataUrl=c.toDataURL("image/jpeg",0.92);
      if(action==="download"){
        const a=document.createElement("a");a.href=dataUrl;a.download=`huerta-${format.replace("/","x")}.jpg`;a.click();
      }else if(action==="share"&&navigator.share){
        c.toBlob(async b=>{
          try{await navigator.share({files:[new File([b],"huerta.jpg",{type:"image/jpeg"})],title:BRAND_NAME});}catch{}
        },"image/jpeg",0.92);
      }else if(action==="copy"&&navigator.clipboard?.write){
        c.toBlob(async b=>{
          try{await navigator.clipboard.write([new ClipboardItem({"image/jpeg":b})]);alert("Imagen copiada al portapapeles");}catch{alert("Tu navegador no permite copiar imágenes. Probá con descargar.");}
        },"image/jpeg",0.92);
      }
    }catch(e){console.error(e);alert("Hubo un error al exportar: "+e.message);}
    setExportBusy(false);
  };

  // Filtro custom
  const cfStr=`brightness(${cfB}%) contrast(${cfC}%) saturate(${cfS}%) sepia(${cfSe}%) hue-rotate(${cfH}deg)`;
  const saveCustomFilter=()=>{
    if(!cfName.trim())return;
    const id="cf_"+Date.now();
    const next=[...customFilters,{id,label:"★ "+cfName,filter:cfStr}];
    setCustomFilters(next);localStorage.setItem("hd_filters",JSON.stringify(next));
    setCfName("");setFilter(id);setEditing("filtros");
  };
  const deleteCustomFilter=id=>{
    const next=customFilters.filter(f=>f.id!==id);
    setCustomFilters(next);localStorage.setItem("hd_filters",JSON.stringify(next));
    if(filter===id)setFilter("none");
  };

  // Helper: dibuja texto con wrap automático y auto-shrink si no entra
  // Devuelve la altura total usada (para encadenar elementos debajo si hace falta)
  const drawSmartText=(ctx,text,opts)=>{
    let {x,y,maxW,fontFamily,fontWeight="normal",fontStyle="normal",initialSize,minSize=14,color,align="center",baseline="middle",lineHeightMul=1.15,maxLines=4}=opts;
    let size=initialSize;
    let lines=[];
    // Achicar fuente progresivamente hasta que entre en maxLines
    while(size>=minSize){
      ctx.font=`${fontStyle} ${fontWeight} ${size}px ${fontFamily}`;
      lines=[];
      const words=(text||"").split(" ");
      let current="";
      for(const w of words){
        const test=current?current+" "+w:w;
        if(ctx.measureText(test).width<=maxW)current=test;
        else{
          if(current)lines.push(current);
          current=w;
          // Si una palabra sola no entra, recortarla
          if(ctx.measureText(current).width>maxW){
            // truncar con elipsis
            while(current.length>1&&ctx.measureText(current+"…").width>maxW)current=current.slice(0,-1);
            current=current+"…";
          }
        }
      }
      if(current)lines.push(current);
      if(lines.length<=maxLines)break;
      size-=2;
    }
    const lineH=size*lineHeightMul;
    const totalH=lineH*lines.length;
    ctx.fillStyle=color;
    ctx.textAlign=align;
    ctx.textBaseline=baseline;
    // Si baseline=middle, y es el centro vertical del bloque
    let startY;
    if(baseline==="middle")startY=y-totalH/2+lineH/2;
    else if(baseline==="top")startY=y;
    else startY=y;
    lines.forEach((l,i)=>ctx.fillText(l,x,startY+i*lineH));
    return {height:totalH,size,lines:lines.length};
  };

  // 4 modelos
  // Dibuja una hojita simple en SVG path-style (forma de almendra con vena central)
  const drawLeaf=(ctx,cx,cy,size,angle,color)=>{
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(angle*Math.PI/180);
    ctx.fillStyle=color;
    ctx.beginPath();
    ctx.moveTo(0,-size);
    ctx.bezierCurveTo(size*0.6,-size*0.7,size*0.6,size*0.7,0,size);
    ctx.bezierCurveTo(-size*0.6,size*0.7,-size*0.6,-size*0.7,0,-size);
    ctx.closePath();
    ctx.fill();
    // vena central
    ctx.strokeStyle="rgba(255,255,255,0.35)";
    ctx.lineWidth=Math.max(1,size*0.05);
    ctx.beginPath();
    ctx.moveTo(0,-size*0.85);
    ctx.lineTo(0,size*0.85);
    ctx.stroke();
    ctx.restore();
  };

  // Dibuja la imagen ENTERA (contain) centrada en un área dada, sin recortar
  const drawImageContain=(ctx,img,x,y,w,h,bgColor)=>{
    if(bgColor){ctx.fillStyle=bgColor;ctx.fillRect(x,y,w,h);}
    const scale=Math.min(w/img.width,h/img.height);
    const dw=img.width*scale,dh=img.height*scale;
    const dx=x+(w-dw)/2,dy=y+(h-dh)/2;
    ctx.drawImage(img,dx,dy,dw,dh);
    return {dx,dy,dw,dh};
  };

  // Dibuja título con UNA palabra destacada en otro color (la última o la marcada con * en el texto)
  // Si el texto tiene un asterisco *así* la palabra entre asteriscos va en color destacado
  const drawHighlightTitle=(ctx,text,opts)=>{
    const {x,y,maxW,fontFamily,fontWeight="bold",fontStyle="normal",initialSize,minSize=24,colorMain,colorAccent,align="center",baseline="middle",maxLines=3,lineHeightMul=1.1}=opts;
    // Detectar palabra entre asteriscos
    const m=text.match(/\*([^*]+)\*/);
    let plainText,accentWord;
    if(m){accentWord=m[1];plainText=text.replace(/\*/g,"");}
    else{plainText=text;accentWord=null;}
    // Usar drawSmartText pero pintando con tracking manual
    let size=initialSize;
    let lines=[];
    while(size>=minSize){
      ctx.font=`${fontStyle} ${fontWeight} ${size}px ${fontFamily}`;
      lines=[];
      const words=plainText.split(" ");
      let cur="";
      for(const w of words){
        const test=cur?cur+" "+w:w;
        if(ctx.measureText(test).width<=maxW)cur=test;
        else{
          if(cur)lines.push(cur);
          cur=w;
        }
      }
      if(cur)lines.push(cur);
      if(lines.length<=maxLines)break;
      size-=2;
    }
    const lineH=size*lineHeightMul;
    const totalH=lineH*lines.length;
    ctx.textAlign=align;ctx.textBaseline=baseline;
    let startY=baseline==="middle"?y-totalH/2+lineH/2:y;
    lines.forEach((line,li)=>{
      const ly=startY+li*lineH;
      if(accentWord&&line.includes(accentWord)){
        // Pintar parte por parte para destacar la palabra
        const parts=line.split(new RegExp(`(${accentWord.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`));
        const widths=parts.map(p=>ctx.measureText(p).width);
        const totalW=widths.reduce((a,b)=>a+b,0);
        let cursorX=align==="center"?x-totalW/2:align==="right"?x-totalW:x;
        ctx.textAlign="left";
        parts.forEach((p,pi)=>{
          ctx.fillStyle=p===accentWord?colorAccent:colorMain;
          ctx.fillText(p,cursorX,ly);
          cursorX+=widths[pi];
        });
        ctx.textAlign=align;
      }else{
        ctx.fillStyle=colorMain;
        ctx.fillText(line,x,ly);
      }
    });
    return {height:totalH,size,lines:lines.length};
  };

  // 4 modelos cálidos — imagen siempre completa, sin recortes raros
  // Logo de la huerta (precargado del DOM si está disponible)
  const getLogoImage=async()=>{
    try{return await loadImage("icon-192.png");}catch{return null;}
  };

  // Dibuja un sello/badge circular con texto (ej: "100% NATURAL", "AGROECOLÓGICO")
  const drawBadge=(ctx,cx,cy,radius,text,opts={})=>{
    const {bgColor="#c8442f",textColor="#fffaf0",borderColor=null,rotation=-12,fontSize=null}=opts;
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(rotation*Math.PI/180);
    // Fondo del badge
    ctx.fillStyle=bgColor;
    ctx.beginPath();
    ctx.arc(0,0,radius,0,Math.PI*2);
    ctx.fill();
    // Borde dentado opcional (efecto "stamp")
    if(borderColor){
      ctx.strokeStyle=borderColor;
      ctx.lineWidth=2;
      ctx.setLineDash([4,3]);
      ctx.beginPath();
      ctx.arc(0,0,radius-6,0,Math.PI*2);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    // Texto centrado, en varias líneas si hace falta
    ctx.fillStyle=textColor;
    const lines=text.split("\n");
    const fs=fontSize||Math.max(11,radius*0.28);
    ctx.font=`bold ${fs}px 'Courier New',monospace`;
    ctx.textAlign="center";ctx.textBaseline="middle";
    const lineH=fs*1.15;
    const startY=-(lines.length-1)*lineH/2;
    lines.forEach((l,i)=>ctx.fillText(l,0,startY+i*lineH));
    ctx.restore();
  };

  // Dibuja una "cinta" con texto (banderín diagonal)
  const drawRibbon=(ctx,cx,cy,w,h,text,opts={})=>{
    const {bgColor="#c8442f",textColor="#fffaf0",rotation=0,fontSize=null}=opts;
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(rotation*Math.PI/180);
    // Fondo del ribbon (rectángulo con triángulos a los lados)
    ctx.fillStyle=bgColor;
    ctx.beginPath();
    ctx.moveTo(-w/2,-h/2);
    ctx.lineTo(w/2,-h/2);
    ctx.lineTo(w/2+h*0.4,0);
    ctx.lineTo(w/2,h/2);
    ctx.lineTo(-w/2,h/2);
    ctx.lineTo(-w/2-h*0.4,0);
    ctx.closePath();
    ctx.fill();
    // Texto
    ctx.fillStyle=textColor;
    const fs=fontSize||h*0.45;
    ctx.font=`bold ${fs}px Georgia,serif`;
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText(text,0,2);
    ctx.restore();
  };

  // Recibe un array de imágenes (1 a N) y devuelve UNA composición visual (combo/grid)
  // dependiendo de la cantidad. Se dibuja dentro del rect (x,y,w,h) sin recortar.
  const drawImagesCombo=(ctx,imgs,x,y,w,h,bgColor="#fffaf0")=>{
    ctx.fillStyle=bgColor;ctx.fillRect(x,y,w,h);
    const n=imgs.length;
    if(n===1){
      drawImageContain(ctx,imgs[0],x,y,w,h,bgColor);
    }else if(n===2){
      // Lado a lado vertical (50/50)
      const gap=8;
      const cellW=(w-gap)/2;
      drawImageContain(ctx,imgs[0],x,y,cellW,h,bgColor);
      drawImageContain(ctx,imgs[1],x+cellW+gap,y,cellW,h,bgColor);
    }else if(n===3){
      // 1 grande izquierda + 2 chicas apiladas derecha
      const gap=8;
      const bigW=(w-gap)*0.62;
      const smW=w-bigW-gap;
      const smH=(h-gap)/2;
      drawImageContain(ctx,imgs[0],x,y,bigW,h,bgColor);
      drawImageContain(ctx,imgs[1],x+bigW+gap,y,smW,smH,bgColor);
      drawImageContain(ctx,imgs[2],x+bigW+gap,y+smH+gap,smW,smH,bgColor);
    }else{
      // 4 o más: grilla 2x2 con las primeras 4
      const gap=8;
      const cellW=(w-gap)/2;
      const cellH=(h-gap)/2;
      const slots=[
        [x,y],[x+cellW+gap,y],
        [x,y+cellH+gap],[x+cellW+gap,y+cellH+gap]
      ];
      slots.forEach((p,i)=>{
        if(imgs[i])drawImageContain(ctx,imgs[i],p[0],p[1],cellW,cellH,bgColor);
      });
      // Si hay más de 4, indicador "+N"
      if(n>4){
        const last=slots[3];
        ctx.fillStyle="rgba(61,40,23,0.85)";
        ctx.fillRect(last[0],last[1],cellW,cellH);
        ctx.fillStyle="#fffaf0";
        ctx.font=`bold ${cellW*0.25}px Georgia,serif`;
        ctx.textAlign="center";ctx.textBaseline="middle";
        ctx.fillText(`+${n-3}`,last[0]+cellW/2,last[1]+cellH/2);
      }
    }
  };

  // Selecciona qué imágenes usar para un modelo dado
  // Si style es "combo" devuelve todas, si no devuelve solo la primera (o varias para algunos casos)
  const pickImagesFor=(style,allImgs)=>{
    if(allImgs.length===0)return [];
    // Modelos que SIEMPRE muestran todas las imágenes en combo
    if(style==="catalogo"||style==="pack")return allImgs;
    // Modelos que muestran 1 sola imagen: usar la primera
    return [allImgs[0]];
  };

  const buildModelo=async(style,imgs,titleOverride,subOverride,badgeOverride)=>{
    const canvas=document.createElement("canvas");
    canvas.width=1080;canvas.height=1080;
    const ctx=canvas.getContext("2d");
    const title=titleOverride||modelosTitulo||"Alma de Huerta";
    const sub=subOverride||modelosSubtitulo||"Sabor artesanal";
    const logo=await getLogoImage();
    // Garantizar que imgs sea un array
    if(!Array.isArray(imgs))imgs=[imgs];
    const im=imgs[0];
    const hasMultiple=imgs.length>1;

    // ===== ESTILO 1: CÁLIDO (referencia tipo "Alma de Huerta" con fondo crema y hojitas) =====
    if(style==="calido"){
      // Fondo crema con textura sutil
      ctx.fillStyle="#f5ecd9";ctx.fillRect(0,0,1080,1080);
      // Sombras suaves de hojas en el fondo (verde muy diluido)
      ctx.globalAlpha=0.08;
      drawLeaf(ctx,80,140,90,-30,"#4a7a2e");
      drawLeaf(ctx,1000,80,75,40,"#79B553");
      drawLeaf(ctx,60,950,80,20,"#79B553");
      drawLeaf(ctx,1010,1000,95,-50,"#4a7a2e");
      drawLeaf(ctx,200,60,55,15,"#79B553");
      drawLeaf(ctx,950,500,60,90,"#4a7a2e");
      ctx.globalAlpha=1;

      // Imagen con fondo blanco redondeado para que destaque
      const padImg=80;
      const imgArea=540; // espacio cuadrado para la imagen
      const imgX=(1080-imgArea)/2;
      const imgY=padImg+40;
      // Tarjeta blanca de fondo de la imagen
      ctx.fillStyle="#ffffff";
      ctx.beginPath();
      const r=24;
      ctx.moveTo(imgX+r,imgY);
      ctx.arcTo(imgX+imgArea,imgY,imgX+imgArea,imgY+imgArea,r);
      ctx.arcTo(imgX+imgArea,imgY+imgArea,imgX,imgY+imgArea,r);
      ctx.arcTo(imgX,imgY+imgArea,imgX,imgY,r);
      ctx.arcTo(imgX,imgY,imgX+imgArea,imgY,r);
      ctx.closePath();
      ctx.fill();
      // Sombra suave debajo de la tarjeta
      ctx.shadowColor="rgba(74,122,46,0.18)";ctx.shadowBlur=20;ctx.shadowOffsetY=8;
      ctx.fill();
      ctx.shadowColor="transparent";ctx.shadowBlur=0;ctx.shadowOffsetY=0;
      // Imagen ENTERA dentro de la tarjeta (contain)
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(imgX+r+10,imgY+10);
      ctx.arcTo(imgX+imgArea-10,imgY+10,imgX+imgArea-10,imgY+imgArea-10,r);
      ctx.arcTo(imgX+imgArea-10,imgY+imgArea-10,imgX+10,imgY+imgArea-10,r);
      ctx.arcTo(imgX+10,imgY+imgArea-10,imgX+10,imgY+10,r);
      ctx.arcTo(imgX+10,imgY+10,imgX+imgArea-10,imgY+10,r);
      ctx.closePath();
      ctx.clip();
      drawImageContain(ctx,im,imgX+10,imgY+10,imgArea-20,imgArea-20,"#ffffff");
      ctx.restore();

      // Hojita decorativa al lado de la imagen
      drawLeaf(ctx,imgX+imgArea-40,imgY-10,32,30,"#79B553");

      // Título grande con palabra destacada
      const titleY=imgY+imgArea+80;
      const tRes=drawHighlightTitle(ctx,title,{
        x:540,y:titleY,maxW:980,fontFamily:"Georgia,serif",fontWeight:"bold",
        initialSize:78,minSize:42,colorMain:"#3d2817",colorAccent:"#c8442f",
        align:"center",baseline:"middle",maxLines:2
      });
      // Subtítulo en cursiva
      drawSmartText(ctx,sub,{
        x:540,y:titleY+tRes.height/2+34,maxW:920,fontFamily:"Georgia,serif",fontStyle:"italic",
        initialSize:34,minSize:22,color:"#5a6e35",align:"center",baseline:"top",maxLines:2
      });
      // Logo abajo (si hay)
      if(logo){
        ctx.drawImage(logo,40,990,70,70);
      }
      // Línea decorativa con hojita en el centro
      drawLeaf(ctx,540,1020,14,0,"#79B553");
    }

    // ===== ESTILO 2: TARJETA (fondo papel/tierra, imagen con marco editorial) =====
    else if(style==="tarjeta"){
      // Fondo color papel (avena claro)
      ctx.fillStyle="#ebe4d3";ctx.fillRect(0,0,1080,1080);
      // Banda superior decorativa con verde oliva
      ctx.fillStyle="#7a8b3d";ctx.fillRect(0,0,1080,12);
      ctx.fillStyle="#c8442f";ctx.fillRect(0,12,1080,4);

      // Etiqueta superior tipo "kicker"
      ctx.fillStyle="#7a8b3d";ctx.font="bold 22px 'Courier New',monospace";
      ctx.textAlign="center";ctx.textBaseline="top";
      ctx.fillText("— HUERTA AGROECOLÓGICA SXXI —",540,60);

      // Imagen ENTERA en zona superior con marco
      const imgArea=620;
      const imgX=(1080-imgArea)/2;
      const imgY=130;
      // Marco color tierra
      ctx.fillStyle="#3d2817";ctx.fillRect(imgX-12,imgY-12,imgArea+24,imgArea+24);
      // Fondo blanco interno (por si la imagen no llena el cuadrado)
      ctx.fillStyle="#fffaf0";ctx.fillRect(imgX,imgY,imgArea,imgArea);
      drawImageContain(ctx,im,imgX,imgY,imgArea,imgArea);

      // Sello/firma abajo izquierda
      if(logo){
        ctx.drawImage(logo,60,940,90,90);
      }

      // Bloque de texto a la derecha del logo
      const textX=180;
      ctx.textAlign="left";ctx.textBaseline="top";
      const tRes=drawHighlightTitle(ctx,title,{
        x:textX,y:imgY+imgArea+50,maxW:840,fontFamily:"Georgia,serif",fontWeight:"bold",
        initialSize:64,minSize:36,colorMain:"#3d2817",colorAccent:"#c8442f",
        align:"left",baseline:"top",maxLines:2
      });
      drawSmartText(ctx,sub,{
        x:textX,y:imgY+imgArea+50+tRes.height+12,maxW:840,fontFamily:"Georgia,serif",fontStyle:"italic",
        initialSize:26,minSize:18,color:"#7a8b3d",align:"left",baseline:"top",maxLines:2
      });
    }

    // ===== ESTILO 3: POLAROID (imagen con marco blanco grueso, sello manuscrito) =====
    else if(style==="polaroid"){
      // Fondo: madera/tierra suave con sutil viñeta
      const grad=ctx.createRadialGradient(540,540,200,540,540,800);
      grad.addColorStop(0,"#d4b896");
      grad.addColorStop(1,"#a08560");
      ctx.fillStyle=grad;ctx.fillRect(0,0,1080,1080);
      // Granulado natural
      ctx.globalAlpha=0.08;
      for(let i=0;i<400;i++){
        ctx.fillStyle=Math.random()>0.5?"#3d2817":"#fffaf0";
        ctx.fillRect(Math.random()*1080,Math.random()*1080,2,2);
      }
      ctx.globalAlpha=1;

      // Hojitas decorativas en las esquinas
      ctx.globalAlpha=0.6;
      drawLeaf(ctx,90,120,55,-25,"#4a7a2e");
      drawLeaf(ctx,150,90,40,30,"#79B553");
      drawLeaf(ctx,990,990,60,160,"#4a7a2e");
      drawLeaf(ctx,920,1020,45,200,"#79B553");
      ctx.globalAlpha=1;

      // Polaroid: marco blanco con la imagen dentro, ligeramente rotado
      ctx.save();
      ctx.translate(540,500);
      ctx.rotate(-2*Math.PI/180);
      // Sombra del polaroid
      ctx.shadowColor="rgba(0,0,0,0.3)";ctx.shadowBlur=24;ctx.shadowOffsetY=10;
      // Marco blanco
      const polW=720,polH=820;
      ctx.fillStyle="#fffaf0";
      ctx.fillRect(-polW/2,-polH/2,polW,polH);
      ctx.shadowColor="transparent";ctx.shadowBlur=0;ctx.shadowOffsetY=0;
      // Imagen entera dentro
      const innerPad=40;
      const imgW=polW-innerPad*2;
      const imgH=imgW; // cuadrado dentro del polaroid
      drawImageContain(ctx,im,-imgW/2,-polH/2+innerPad,imgW,imgH,"#f5ecd9");
      ctx.restore();

      // Título tipo manuscrito sobre el polaroid (en la zona blanca de abajo)
      ctx.save();
      ctx.translate(540,920);
      ctx.rotate(-2*Math.PI/180);
      const tRes=drawHighlightTitle(ctx,title,{
        x:0,y:0,maxW:640,fontFamily:"Georgia,serif",fontWeight:"bold",fontStyle:"italic",
        initialSize:54,minSize:30,colorMain:"#3d2817",colorAccent:"#c8442f",
        align:"center",baseline:"middle",maxLines:2
      });
      drawSmartText(ctx,sub,{
        x:0,y:tRes.height/2+18,maxW:640,fontFamily:"Georgia,serif",fontStyle:"italic",
        initialSize:24,minSize:16,color:"#7a8b3d",align:"center",baseline:"top",maxLines:1
      });
      ctx.restore();

      // Logo flotante en la esquina (con leve rotación)
      if(logo){
        ctx.save();
        ctx.translate(990,200);
        ctx.rotate(8*Math.PI/180);
        ctx.shadowColor="rgba(0,0,0,0.25)";ctx.shadowBlur=12;ctx.shadowOffsetY=4;
        ctx.drawImage(logo,-50,-50,100,100);
        ctx.shadowColor="transparent";ctx.shadowBlur=0;
        ctx.restore();
      }
    }

    // ===== ESTILO 4: VERDE NATURAL (fondo verde con hojas, imagen circular completa) =====
    else if(style==="verde"){
      // Fondo verde con gradiente cálido
      const g=ctx.createLinearGradient(0,0,0,1080);
      g.addColorStop(0,"#5a7d33");g.addColorStop(1,"#3a5520");
      ctx.fillStyle=g;ctx.fillRect(0,0,1080,1080);
      // Hojas grandes semitransparentes en el fondo
      ctx.globalAlpha=0.15;
      drawLeaf(ctx,140,180,180,-40,"#a3d076");
      drawLeaf(ctx,940,180,160,45,"#a3d076");
      drawLeaf(ctx,150,950,170,30,"#a3d076");
      drawLeaf(ctx,930,930,200,-50,"#a3d076");
      ctx.globalAlpha=1;

      // Círculo blanco grande con la imagen ENTERA dentro (contain)
      const cx=540,cy=460,radius=320;
      ctx.fillStyle="#fffaf0";
      ctx.beginPath();
      ctx.arc(cx,cy,radius,0,Math.PI*2);
      ctx.fill();
      // Sombra del círculo
      ctx.shadowColor="rgba(0,0,0,0.2)";ctx.shadowBlur=20;ctx.shadowOffsetY=8;
      ctx.fill();
      ctx.shadowColor="transparent";ctx.shadowBlur=0;ctx.shadowOffsetY=0;
      // Borde decorativo
      ctx.strokeStyle="#a3d076";ctx.lineWidth=4;
      ctx.beginPath();
      ctx.arc(cx,cy,radius+12,0,Math.PI*2);
      ctx.stroke();
      // Imagen contain dentro del círculo
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx,cy,radius-15,0,Math.PI*2);
      ctx.clip();
      // contenedor ligeramente más grande que el área visual del círculo, contain dentro
      const sz=(radius-15)*2;
      drawImageContain(ctx,im,cx-sz/2,cy-sz/2,sz,sz,"#fffaf0");
      ctx.restore();

      // Hojitas decorativas alrededor del círculo
      drawLeaf(ctx,cx-radius-30,cy-radius+40,40,-50,"#a3d076");
      drawLeaf(ctx,cx+radius+30,cy-radius+40,40,50,"#a3d076");
      drawLeaf(ctx,cx,cy-radius-50,30,0,"#fffaf0");

      // Título y subtítulo abajo
      const titleY=850;
      const tRes=drawHighlightTitle(ctx,title,{
        x:540,y:titleY,maxW:980,fontFamily:"Georgia,serif",fontWeight:"bold",
        initialSize:74,minSize:42,colorMain:"#fffaf0",colorAccent:"#FFCE54",
        align:"center",baseline:"middle",maxLines:2
      });
      drawSmartText(ctx,sub,{
        x:540,y:titleY+tRes.height/2+28,maxW:980,fontFamily:"Georgia,serif",fontStyle:"italic",
        initialSize:30,minSize:20,color:"#a3d076",align:"center",baseline:"top",maxLines:2
      });
      // Logo y línea decorativa abajo
      if(logo){
        ctx.drawImage(logo,40,980,72,72);
      }
      ctx.fillStyle="#a3d076";ctx.font="14px 'Courier New',monospace";
      ctx.textAlign="center";ctx.textBaseline="alphabetic";
      ctx.fillText("AGROECOLOGÍA · SINTROPIA · AGROFLORESTA",540,1050);
    }

    // ===== ESTILO 5: CATÁLOGO (grid moderno con sello y badge "100% NATURAL") =====
    else if(style==="catalogo"){
      // Fondo: gradiente cálido tipo papel artesanal
      const grad=ctx.createLinearGradient(0,0,1080,1080);
      grad.addColorStop(0,"#f5ecd9");
      grad.addColorStop(1,"#e8dcc0");
      ctx.fillStyle=grad;ctx.fillRect(0,0,1080,1080);

      // Granulado natural
      ctx.globalAlpha=0.06;
      for(let i=0;i<300;i++){
        ctx.fillStyle=Math.random()>0.5?"#3d2817":"#7a8b3d";
        ctx.fillRect(Math.random()*1080,Math.random()*1080,2,2);
      }
      ctx.globalAlpha=1;

      // Cabecera: kicker + título a la izquierda, logo a la derecha
      ctx.fillStyle="#7a8b3d";
      ctx.font="bold 18px 'Courier New',monospace";
      ctx.textAlign="left";ctx.textBaseline="top";
      ctx.fillText("— DE NUESTRA HUERTA",60,55);

      // Título
      ctx.textAlign="left";ctx.textBaseline="top";
      const tRes=drawHighlightTitle(ctx,title,{
        x:60,y:90,maxW:780,fontFamily:"Georgia,serif",fontWeight:"bold",
        initialSize:62,minSize:36,colorMain:"#3d2817",colorAccent:"#c8442f",
        align:"left",baseline:"top",maxLines:2
      });
      // Logo arriba derecha
      if(logo){
        ctx.drawImage(logo,940,50,90,90);
      }

      // Composición de imágenes (combo si hay varias)
      const comboY=90+tRes.height+40;
      const comboH=720;
      const comboX=60;
      const comboW=960;

  const generateCollage=async()=>{
    const layout=COLLAGE_LAYOUTS.find(l=>l.id===collageLayout);
    if(collageImgs.length<layout.min)return;
    const canvas=document.createElement("canvas");
    canvas.width=1080;canvas.height=1080;
    const ctx=canvas.getContext("2d");
    ctx.fillStyle="#0a0a0a";ctx.fillRect(0,0,1080,1080);
    const gap=10;
    try{
      const imgs=await Promise.all(collageImgs.slice(0,layout.max).map(u=>loadImage(u)));
      if(collageLayout==="2x2"){
        const s=(1080-gap*3)/2;
        const pos=[[gap,gap],[gap*2+s,gap],[gap,gap*2+s],[gap*2+s,gap*2+s]];
        imgs.forEach((im,i)=>pos[i]&&drawImageCover(ctx,im,pos[i][0],pos[i][1],s,s));
      }else if(collageLayout==="1+2"){
        const bigH=(1080-gap*3)*0.6,smH=1080-bigH-gap*3,smW=(1080-gap*3)/2;
        if(imgs[0])drawImageCover(ctx,imgs[0],gap,gap,1080-gap*2,bigH);
        if(imgs[1])drawImageCover(ctx,imgs[1],gap,bigH+gap*2,smW,smH);
        if(imgs[2])drawImageCover(ctx,imgs[2],smW+gap*2,bigH+gap*2,smW,smH);
      }else if(collageLayout==="3col"){
        const w=(1080-gap*4)/3;
        imgs.slice(0,3).forEach((im,i)=>drawImageCover(ctx,im,gap+i*(w+gap),gap,w,1080-gap*2));
      }else if(collageLayout==="1+3"){
        const bigW=(1080-gap*3)*0.65,restW=1080-bigW-gap*3;
        const smH=(1080-gap*4)/3;
        if(imgs[0])drawImageCover(ctx,imgs[0],gap,gap,bigW,1080-gap*2);
        [1,2,3].forEach((k,i)=>imgs[k]&&drawImageCover(ctx,imgs[k],bigW+gap*2,gap+i*(smH+gap),restW,smH));
      }
      ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(0,1020,1080,60);
      ctx.fillStyle="#fff";ctx.font="bold 24px Georgia,serif";ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText("🌱 "+BRAND_NAME,540,1050);
      setCollageResult(canvas.toDataURL("image/jpeg",0.92));
    }catch(e){alert("Hubo un error armando el collage");}
  };

      let bx,by;
      if(aguaPos==="bottomRight"){bx=im.width-boxW-20;by=im.height-boxH-20;}

      else{bx=(im.width-boxW)/2;by=(im.height-boxH)/2;}
      ctx.globalAlpha=aguaOpacity/100*0.55;
      ctx.fillStyle="#0a0a0a";ctx.fillRect(bx,by,boxW,boxH);

                  ))}
                  {collageImgs.length<4&&(
                    <button onClick={()=>collageRef.current?.click()} style={{aspectRatio:"1",borderRadius:8,border:"2px dashed var(--border-strong)",background:"transparent",color:"var(--muted)",cursor:"pointer",fontSize:24}}>+</button>
                  )}
                </div>
                <input ref={collageRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={addCollageImgs}/>
              </Card>

              <Btn onClick={generateCollage} disabled={collageImgs.length<(COLLAGE_LAYOUTS.find(l=>l.id===collageLayout)?.min||2)} variant="sun" style={{marginBottom:14}}>Armar el collage</Btn>

              {collageResult&&(
                <Card>
                  <Lbl>Resultado</Lbl>
                  <img src={collageResult} alt="" style={{width:"100%",maxWidth:300,margin:"0 auto",display:"block",borderRadius:10}}/>
                  <Btn onClick={()=>download(collageResult,"huerta-collage.jpg")} style={{marginTop:12}}>⬇ Descargar</Btn>
                </Card>
              )}
            </div>
          )}

          {/* ============ RESIZE ============ */}
          {tool==="resize"&&(
            <div className="fade">
              <Card style={{marginBottom:14}}>
                <img src={img} alt="" style={{width:"100%",maxWidth:240,margin:"0 auto 14px",display:"block",borderRadius:10,maxHeight:200,objectFit:"contain",background:"#000"}}/>
                <Lbl>Medida para red social</Lbl>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
                  {SOCIAL_FORMATS.concat([{id:"fb",label:"Facebook",size:"1200×630",icon:"▬",w:1200,h:630},{id:"yt",label:"YouTube",size:"1280×720",icon:"▶",w:1280,h:720}]).map(f=>(
                    <button key={f.id} onClick={()=>setResizeSocial(f)} style={{padding:"12px",borderRadius:10,border:`2px solid ${resizeSocial.id===f.id?"var(--green)":"transparent"}`,background:resizeSocial.id===f.id?"rgba(121,181,83,0.15)":"rgba(255,255,255,0.05)",color:"#fff",cursor:"pointer",fontFamily:"Georgia,serif",textAlign:"left"}}>
                      <div style={{fontSize:18,marginBottom:4,color:"var(--green)"}}>{f.icon}</div>
                      <div style={{fontWeight:700,fontSize:13}}>{f.label}</div>
                      <div className="mono" style={{color:"var(--muted)",fontSize:9}}>{f.size}</div>
                    </button>
                  ))}
                </div>
                <Lbl>Cómo encajar la imagen</Lbl>
                <div style={{display:"flex",gap:6,marginBottom:12}}>
                  <Pill active={resizeFit==="cover"} onClick={()=>setResizeFit("cover")}>Llenar (recorta)</Pill>
                  <Pill active={resizeFit==="contain"} onClick={()=>setResizeFit("contain")}>Completa (con bordes)</Pill>
                </div>
                {resizeFit==="contain"&&(<>
                  <Lbl>Color del borde</Lbl>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {BRAND_PALETTE.map(c=><button key={c.hex} onClick={()=>setResizeBgColor(c.hex)} title={c.name} style={{width:28,height:28,borderRadius:6,border:resizeBgColor===c.hex?"2px solid #fff":"1px solid var(--border)",background:c.hex,cursor:"pointer"}}/>)}
                    <input type="color" value={resizeBgColor} onChange={e=>setResizeBgColor(e.target.value)} style={{width:28,height:28,padding:0,borderRadius:6}}/>
                  </div>
                </>)}
              </Card>
              <Btn onClick={generateResize} variant="sun" style={{marginBottom:14}}>Redimensionar</Btn>
              {resizeResult&&(
                <Card>
                  <Lbl>Resultado · {resizeSocial.size}</Lbl>
                  <img src={resizeResult} alt="" style={{width:"100%",maxWidth:300,margin:"0 auto",display:"block",borderRadius:10,background:"#000"}}/>
                  <Btn onClick={()=>download(resizeResult,`huerta-${resizeSocial.label.toLowerCase().replace(/\s/g,"-")}.jpg`)} style={{marginTop:12}}>⬇ Descargar</Btn>
                </Card>
              )}
            </div>
          )}

          {/* ============ MARCA DE AGUA ============ */}
          {tool==="agua"&&(
            <div className="fade">
              <Card style={{marginBottom:14}}>
                <img src={img} alt="" style={{width:"100%",maxWidth:240,margin:"0 auto 14px",display:"block",borderRadius:10,maxHeight:200,objectFit:"contain",background:"#000"}}/>
                <Lbl>Texto de la firma</Lbl>
                <input value={aguaText} onChange={e=>setAguaText(e.target.value)} style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid var(--border)",borderRadius:8,padding:10,color:"#fff",fontSize:13,marginBottom:12,fontFamily:"Georgia,serif"}}/>
                <Lbl>Posición</Lbl>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:5,marginBottom:12}}>
                  {[{id:"topLeft",l:"↖ Arriba izq."},{id:"center",l:"◉ Centro"},{id:"topRight",l:"↗ Arriba der."},{id:"bottomLeft",l:"↙ Abajo izq."},{id:"bottomRight",l:"↘ Abajo der."}].map(p=>(
                    <button key={p.id} onClick={()=>setAguaPos(p.id)} style={{padding:"10px 6px",borderRadius:6,border:`2px solid ${aguaPos===p.id?"var(--green)":"transparent"}`,background:aguaPos===p.id?"rgba(121,181,83,0.15)":"rgba(255,255,255,0.05)",color:"#fff",fontSize:11,cursor:"pointer",fontFamily:"Georgia,serif"}}>{p.l}</button>
                  ))}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <div><Lbl>Opacidad — {aguaOpacity}%</Lbl><input type="range" min={20} max={100} value={aguaOpacity} onChange={e=>setAguaOpacity(+e.target.value)} style={{width:"100%"}}/></div>
                  <div><Lbl>Tamaño — {aguaSize}%</Lbl><input type="range" min={2} max={10} value={aguaSize} onChange={e=>setAguaSize(+e.target.value)} style={{width:"100%"}}/></div>
                </div>
              </Card>
              <Btn onClick={applyWatermark} variant="sun" style={{marginBottom:14}}>Aplicar marca de agua</Btn>
              {aguaResult&&(
                <Card>
                  <Lbl>Resultado</Lbl>
                  <img src={aguaResult} alt="" style={{width:"100%",maxWidth:300,margin:"0 auto",display:"block",borderRadius:10}}/>
                  <Btn onClick={()=>download(aguaResult,"huerta-marca.jpg")} style={{marginTop:12}}>⬇ Descargar</Btn>
                </Card>
              )}
            </div>
          )}
          </>
          )}
        </main>
      )}

      {/* FOOTER */}
      <footer style={{textAlign:"center",padding:"20px 16px 16px",borderTop:"1px solid var(--border)"}}>
        <div className="mono" style={{color:"var(--muted)",marginBottom:6}}>Huerta SXXI · Estudio · v3</div>
        <div className="editorial" style={{fontSize:11,color:"rgba(245,242,232,0.3)",fontStyle:"italic"}}>Hecho con cariño para la huerta.</div>
      </footer>

      <div className="stripe"/>

      {/* MODAL API KEY */}
      {apiKeyModal&&(
        <div onClick={e=>{if(e.target===e.currentTarget)setApiKeyModal(false);}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16,backdropFilter:"blur(4px)"}}>
          <div style={{background:"#141414",border:"1px solid var(--border-strong)",borderRadius:16,padding:24,maxWidth:480,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.5)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <div className="brand" style={{fontSize:20}}>Configurar IA</div>
              <button onClick={()=>setApiKeyModal(false)} style={{background:"transparent",border:"1px solid var(--border)",color:"var(--muted)",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:16}}>✕</button>
            </div>
            {apiKeyMessage&&(
              <div style={{background:"rgba(249,168,37,0.12)",border:"1px solid var(--sun)",color:"var(--sun-l)",borderRadius:8,padding:"10px 12px",fontSize:12,marginBottom:14,lineHeight:1.5}}>
                ⚠ {apiKeyMessage}
              </div>
            )}
            <div className="editorial" style={{fontSize:13,color:"var(--muted)",lineHeight:1.6,marginBottom:14}}>
              Para que la IA funcione (modelos automáticos, sugerencias de copy), necesitás una clave de Google Gemini. Es gratis. Se guarda <strong style={{color:"var(--green-l)"}}>sólo en este dispositivo</strong>, no se sube a ningún lado.
            </div>
            <div style={{background:"rgba(121,181,83,0.08)",border:"1px solid rgba(121,181,83,0.3)",borderRadius:8,padding:12,marginBottom:14,fontSize:12,lineHeight:1.7}}>
              <div className="mono" style={{color:"var(--green-l)",marginBottom:6,fontSize:10}}>Cómo conseguir tu clave</div>
              <ol style={{paddingLeft:18,margin:0}}>
                <li>Andá a <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener" style={{color:"var(--sun)",textDecoration:"underline"}}>aistudio.google.com/app/apikey</a></li>
                <li>Iniciá sesión con tu cuenta de Google</li>
                <li>Tocá <strong>"Create API key"</strong> y copiá la clave</li>
                <li>Pegala acá abajo y guardá</li>
              </ol>
            </div>
            <Lbl>Tu clave de Gemini</Lbl>
            <input
              value={apiKeyDraft}
              onChange={e=>setApiKeyDraft(e.target.value)}
              placeholder="AIzaSy..."
              autoComplete="off"
              spellCheck="false"
              style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid var(--border-strong)",borderRadius:8,padding:12,color:"#fff",fontSize:13,fontFamily:"'Courier New',monospace",marginBottom:14}}
            />
            <div style={{display:"grid",gridTemplateColumns:hasApiKey?"1fr 1fr":"1fr",gap:8}}>
              <Btn onClick={saveApiKeyDraft} disabled={!apiKeyDraft.trim()} variant="sun">Guardar clave</Btn>
              {hasApiKey&&<Btn onClick={clearStoredKey} variant="ghost" style={{color:"var(--muted)"}}>Borrar guardada</Btn>}
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
<script>
  if("serviceWorker" in navigator){
    window.addEventListener("load",()=>{
      navigator.serviceWorker.register("sw-diseno.js").catch(()=>{});
    });
  }
</script>
</body>
</html>
